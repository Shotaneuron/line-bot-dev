<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>イベントカレンダー | 北大心理ゼミ</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@700;900&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales-all.min.js"></script>
    <!-- LIFF -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background: linear-gradient(-45deg, #ffffff, #f8fafc, #eff6ff, #fdf4ff, #fffbeb); background-size: 300% 300%; animation: auroraBG 15s ease infinite; color: #1e293b; min-height: 100vh; padding-bottom: 5rem; }
        @keyframes auroraBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 10px 30px -10px rgba(71, 85, 105, 0.15); }
        .fc-toolbar-title { font-size: 1.25rem !important; font-weight: 900 !important; color: #1e293b; }
        .fc-button-primary { background-color: #6366f1 !important; border-color: #6366f1 !important; border-radius: 0.75rem !important; font-weight: bold !important; text-transform: capitalize !important;}
        .fc-daygrid-day-number { color: #475569; font-weight: bold; font-size: 0.8rem; text-decoration: none !important; }
        .fc-col-header-cell-cushion { color: #64748b; font-weight: bold; padding: 8px 0 !important; text-decoration: none !important; }
        .fc-theme-standard td, .fc-theme-standard th { border-color: #e2e8f0; }
        .fc-event { border-radius: 4px; border: none; font-size: 0.65rem; font-weight: bold; padding: 2px 4px; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        /* ローディング用 */
        .loader { border: 3px solid #f3f4f6; border-top: 3px solid #6366f1; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* ボトムシート */
        .slide-up { transform: translateY(0) !important; }
    </style>
</head>
<body class="safe-area-inset-top p-4">

    <!-- ヘッダー -->
    <div class="flex items-center justify-between mb-4 mt-2 px-1">
        <div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight" style="font-family: 'Zen Kaku Gothic New', sans-serif;">CALENDAR</h1>
            <p class="text-[10px] text-slate-500 font-bold mt-0.5 tracking-wider">ゼミの活動予定をチェック</p>
        </div>
        <div id="loading-indicator" class="flex items-center gap-2 text-xs font-bold text-indigo-500 bg-white/80 backdrop-blur-md px-3 py-1.5 rounded-full shadow-sm border border-indigo-100 hidden">
            <div class="loader" style="width: 14px; height: 14px; border-width: 2px;"></div>
            同期中...
        </div>
    </div>

    <!-- カレンダー本体 -->
    <div class="glass-card rounded-3xl p-3 shadow-sm relative overflow-hidden mb-6">
        <div id="calendar"></div>
    </div>

    <!-- イベント詳細モーダル (Bottom Sheet) -->
    <div id="event-modal" class="fixed inset-0 z-[70] hidden flex-col justify-end bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeEventModal()">
        <div class="bg-white rounded-t-[2rem] p-6 pb-12 w-full shadow-2xl relative translate-y-full transition-transform duration-300 ease-out max-h-[85vh] overflow-y-auto" id="event-sheet" onclick="event.stopPropagation()">
            <div class="absolute top-3 left-1/2 transform -translate-x-1/2 w-12 h-1.5 bg-slate-200 rounded-full"></div>
            
            <div id="modal-content" class="mt-4">
                <!-- JSでコンテンツを生成 -->
            </div>
            
        </div>
    </div>

    <!-- トースト通知 -->
    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-sm font-bold px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 pointer-events-none z-[100]">
        通知メッセージ
    </div>

    <script>
        let calendar;

        // カテゴリごとの色設定（Notionのタグに応じて見やすく）
        function getCategoryColor(category) {
            const colors = {
                '運営部': '#8b5cf6', // Indigo
                '読書部': '#ec4899', // Pink
                '運動PJ': '#10b981', // Emerald
                'すこやか部': '#f59e0b', // Amber
                '全体運営': '#3b82f6', // Blue
                '幹部会': '#ef4444', // Red
            };
            return colors[category] || '#64748b'; // デフォルト
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const calendarEl = document.getElementById('calendar');
            const loadingIndicator = document.getElementById('loading-indicator');
            
            // 📅 FullCalendarの初期化
            calendar = new FullCalendar.Calendar(calendarEl, {
                locale: 'ja',
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next',
                    center: 'title',
                    right: 'today'
                },
                buttonText: {
                    today: '今日'
                },
                height: 'auto',
                contentHeight: 'auto',
                
                // 🕒 時間表示の設定（18:30 等で表示）
                displayEventTime: true,
                eventTimeFormat: {
                    hour: 'numeric',
                    minute: '2-digit',
                    meridiem: false // 24時間表記
                },

                // 👆 イベントタップ時の処理
                eventClick: function(info) {
                    showEventModal(info.event);
                }
            });

            calendar.render();

            // データ取得開始
            loadingIndicator.classList.remove('hidden');
            let eventsData = [];
            
            try {
                // バックエンドAPIからイベント一覧を取得
                const response = await fetch('https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getNotionEvents');
                
                // エラーハンドリングの強化
                if (!response.ok) {
                    let errorMsg = `HTTP error! status: ${response.status}`;
                    try {
                        const errorText = await response.text();
                        errorMsg += `\nResponse: ${errorText}`;
                    } catch (e) {}
                    throw new Error(errorMsg);
                }
                
                const textData = await response.text();
                eventsData = JSON.parse(textData);
                
                if (!Array.isArray(eventsData)) {
                    console.warn("Unexpected API response format:", eventsData);
                    eventsData = []; 
                } else {
                    // API取得成功時、ローカルストレージにバックアップとして保存
                    localStorage.setItem('zemi_calendar_backup', JSON.stringify(eventsData));
                }

            } catch (error) {
                // エラー発生時（500エラーなど）は、赤いコンソールエラーを抑制し、ローカルキャッシュからの復元を試みる
                console.warn("【バックエンド通信エラー】APIの取得に失敗しました。ローカルキャッシュを試みます:", error.message);
                
                const backupData = localStorage.getItem('zemi_calendar_backup');
                if (backupData) {
                    try {
                        eventsData = JSON.parse(backupData);
                        showToast("サーバー通信エラーのため、前回のデータを表示しています。");
                    } catch(e) {
                        eventsData = [];
                        showToast("イベントの読み込みに失敗しました。");
                    }
                } else {
                    showToast("イベントの読み込みに失敗しました。");
                }
            } finally {
                loadingIndicator.classList.add('hidden');
                
                // データ（API通信またはキャッシュ）をカレンダー用に整形して描画
                if (eventsData && eventsData.length > 0) {
                    const formattedEvents = eventsData.map(event => {
                        let endDate = event.endDate;
                        let isAllDay = false;

                        if (event.date && !event.date.includes('T')) {
                            isAllDay = true;
                        }

                        if (endDate && !endDate.includes('T')) {
                            let endObj = new Date(endDate);
                            endObj.setDate(endObj.getDate() + 1);
                            endDate = endObj.toISOString().split('T')[0];
                        }

                        return {
                            id: event.id,
                            title: event.title,
                            start: event.date,
                            end: endDate,
                            allDay: isAllDay,
                            backgroundColor: getCategoryColor(event.category),
                            extendedProps: {
                                category: event.category || '未分類',
                                details: event.details || '詳細はありません',
                                status: event.status || '',
                                sender: event.sender || '',
                                participants: event.participants || '',
                                pending: event.pending || '',
                                absent: event.absent || ''
                            }
                        };
                    });

                    calendar.addEventSource(formattedEvents);
                }
            }
        });

        // 📱 モーダル（Bottom Sheet）の表示処理
        function showEventModal(eventObj) {
            const props = eventObj.extendedProps;
            
            // 時間の表示テキスト作成
            let timeStr = "";
            if (eventObj.allDay) {
                timeStr = "終日";
            } else {
                const start = eventObj.start;
                const end = eventObj.end;
                const formatTime = (date) => {
                    if(!date) return "";
                    return date.getHours() + ":" + String(date.getMinutes()).padStart(2, '0');
                };
                timeStr = formatTime(start);
                if (end) {
                    timeStr += " - " + formatTime(end);
                }
            }

            // 日付の表示テキスト作成
            const formatDay = (date) => {
                if(!date) return "";
                return (date.getMonth() + 1) + "/" + date.getDate() + "(" + ["日","月","火","水","木","金","土"][date.getDay()] + ")";
            };
            let dateStr = formatDay(eventObj.start);
            if (eventObj.allDay && eventObj.end) {
                // 終日イベントで複数日にまたがる場合（+1日されているので表示用に-1日戻す）
                let realEnd = new Date(eventObj.end);
                realEnd.setDate(realEnd.getDate() - 1);
                // 開始日と終了日が違う場合のみ「〜」でつなぐ
                if(eventObj.start.getTime() !== realEnd.getTime()){
                    dateStr += " 〜 " + formatDay(realEnd);
                }
            }

            const html = `
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-[10px] font-black px-2.5 py-0.5 rounded-md text-white shadow-sm" style="background-color: ${eventObj.backgroundColor}">${props.category}</span>
                    <span class="text-xs text-slate-500 font-bold bg-slate-100 px-2 py-0.5 rounded-md">${dateStr} ${timeStr}</span>
                </div>
                
                <h3 class="text-xl font-black text-slate-800 mb-4 leading-tight">${eventObj.title}</h3>
                
                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 mb-4">
                    <h4 class="text-xs font-black text-slate-400 mb-2 flex items-center gap-1"><span>📝</span> 詳細</h4>
                    <p class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">${props.details}</p>
                </div>
                
                <div class="space-y-2">
                    <div class="flex items-start gap-3 bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                        <span class="text-lg mt-0.5">🙋‍♂️</span>
                        <div>
                            <span class="text-[10px] font-bold text-indigo-400 block mb-0.5">参加予定</span>
                            <p class="text-xs font-bold text-slate-700 leading-relaxed">${props.participants || 'まだいません'}</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-3 bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                        <span class="text-lg mt-0.5">🤔</span>
                        <div>
                            <span class="text-[10px] font-bold text-amber-500 block mb-0.5">迷い中</span>
                            <p class="text-xs font-bold text-slate-700 leading-relaxed">${props.pending || 'まだいません'}</p>
                        </div>
                    </div>
                </div>

                <div class="mt-6 flex gap-3">
                    <button onclick="registerEvent('${eventObj.title}', '参加')" class="flex-1 bg-gradient-to-r from-indigo-500 to-pink-500 text-white font-black py-4 rounded-xl active:scale-95 transition shadow-md text-sm flex justify-center items-center gap-1">
                        <span>🙋‍♂️</span> 参加する
                    </button>
                    <button onclick="registerEvent('${eventObj.title}', '迷い中')" class="flex-1 bg-white border border-slate-200 text-slate-600 font-black py-4 rounded-xl active:scale-95 transition text-sm shadow-sm">
                        保留（迷い中）
                    </button>
                </div>
                
                <button onclick="closeEventModal()" class="mt-4 w-full bg-transparent text-slate-400 font-bold py-3 rounded-xl active:scale-95 transition text-sm underline">閉じる</button>
            `;

            document.getElementById('modal-content').innerHTML = html;

            const modal = document.getElementById('event-modal');
            const sheet = document.getElementById('event-sheet');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // 少し遅らせてアニメーション発火
            setTimeout(() => { sheet.classList.add('slide-up'); }, 10);
        }

        function closeEventModal() {
            const modal = document.getElementById('event-modal');
            const sheet = document.getElementById('event-sheet');
            sheet.classList.remove('slide-up');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        // 🚀 LIFF経由で参加登録メッセージを送信
        async function registerEvent(title, status) {
            try {
                if (liff.isLoggedIn()) {
                    await liff.sendMessages([
                        {
                            type: 'text',
                            text: `【イベント回答】\n${title}\nステータス: ${status}`
                        }
                    ]);
                    showToast("LINEに回答を送信しました！");
                    setTimeout(() => {
                        liff.closeWindow();
                    }, 1500);
                } else {
                    showToast("LINEアプリから開いてください");
                }
            } catch (err) {
                console.error("メッセージ送信エラー:", err);
                showToast("送信に失敗しました");
            }
        }

        // トースト通知を表示する関数
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
            }, 3000);
        }

        // 🚀 LIFFの初期化
        async function initLiff() {
            try {
                await liff.init({ liffId: "2009176797-wHDy2QrV" }); 
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init Error:", err);
            }
        }
        
        initLiff();

    </script>
</body>
</html>
