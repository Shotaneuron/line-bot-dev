<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>診断結果 | 北大心理ゼミ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background: #f0fdfa; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .btn-hover { transition: transform 0.2s; }
        .btn-hover:active { transform: scale(0.96); }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="safe-area-inset-top p-5">

    <header class="text-center mb-6 pt-4 fade-in">
        <p class="text-[10px] font-black text-sky-500 tracking-[0.3em] mb-1 uppercase">Result</p>
        <h1 id="result-title" class="text-2xl font-black text-slate-800 tracking-tight">診断完了！ 🎉</h1>
    </header>

    <main class="flex-1 flex flex-col justify-center pb-10">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin text-4xl mb-4">🌀</div>
            <p class="font-black text-slate-500 tracking-widest">結果を分析中...</p>
        </div>

        <div id="result-content" class="hidden fade-in">
            
            <div id="chart-container" class="w-full aspect-square mb-6 bg-white rounded-3xl p-4 shadow-sm border border-slate-200">
                <canvas id="radarChart"></canvas>
            </div>

            <div id="detail-report-section" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 mb-6">
                <h3 class="text-sm font-black text-indigo-600 mb-3 border-b border-slate-100 pb-2 flex items-center gap-2"><span>🤖</span> AI先輩の詳細レポート</h3>
                <p id="result-text" class="text-xs text-slate-700 font-bold leading-relaxed whitespace-pre-wrap"></p>
                <div id="extra-html-container"></div>
            </div>

            <div id="similar-users-section" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 mb-6 hidden">
                <h3 class="text-sm font-black text-emerald-600 mb-3 border-b border-slate-100 pb-2 flex items-center gap-2"><span>🤝</span> あなたと同じタイプのゼミ生</h3>
                <div id="similar-users-list" class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                    </div>
            </div>

            <div class="grid grid-cols-3 gap-2 mt-6 mb-8 border-t border-slate-200 pt-6">
                <button onclick="shareOnX()" class="bg-black text-white font-bold py-3 rounded-xl flex flex-col items-center justify-center gap-1 active:scale-95 transition shadow-sm text-[10px]">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    Xでシェア
                </button>
                <button onclick="shareOnLINE()" class="bg-[#06C755] text-white font-bold py-3 rounded-xl flex flex-col items-center justify-center gap-1 active:scale-95 transition shadow-sm text-[10px]">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.12.292.031.753-.021 1.07l-.234 1.411c-.066.425-.325 1.564 1.369.851 1.693-.711 9.157-5.385 11.458-9.01.222-.352.335-.71.335-1.07v-3.452z"/></svg>
                    LINEで教える
                </button>
                <button onclick="shareOnInstagram()" class="bg-gradient-to-tr from-[#fd5949] to-[#d6249f] text-white font-bold py-3 rounded-xl flex flex-col items-center justify-center gap-1 active:scale-95 transition shadow-sm text-[10px]">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                    インスタへ
                </button>
            </div>
            <script>
            const SHARE_URL = "https://liff.line.me/2009176797-S5FV668D"; 

            function getShareText() {
                const typeName = document.getElementById('result-title') ? document.getElementById('result-title').innerText.replace(' 分析完了', '').replace(' 完了', '') : "〇〇タイプ"; 
                return `北大心理ゼミの診断で、私の結果は「${typeName}」でした！🧠✨\n\nあなたも自分の心理タイプを診断してみよう👇\n${SHARE_URL}`;
            }

            function shareOnX() {
                const text = encodeURIComponent(getShareText());
                window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
            }

            function shareOnLINE() {
                const text = encodeURIComponent(getShareText());
                window.open(`https://line.me/R/msg/text/?${text}`, '_blank');
            }

            function shareOnInstagram() {
                const text = getShareText();
                navigator.clipboard.writeText(text).then(() => {
                    alert("✅ 診断結果のテキストをコピーしました！\n\nInstagramを開くので、ストーリーズや投稿のテキストに「ペースト（貼り付け）」してシェアしてください✨");
                    window.location.href = "instagram://camera";
                }).catch(err => {
                    alert("コピーに失敗しました。画面のテキストを手動でコピーしてください🙇‍♂️");
                });
            }
            </script>

            <button onclick="window.location.href='test.html'" class="w-full bg-slate-800 text-white text-sm font-black py-4 rounded-2xl shadow-lg btn-hover flex justify-center items-center">
                🏠 ホーム（ポータル）へ戻る
            </button>
        </div>
    </main>

    <script>
    let myChart = null;

    const FACET_DICT = {
        'E': { title: "外向性の内訳", color: "bg-orange-400", facets: { 1: "友好性", 2: "社交性", 3: "自己主張", 4: "活動水準", 5: "刺激希求", 6: "明朗性" }, descs: { 1: "周囲へ親しみを感じ、温かく接する傾向", 2: "人と一緒にいることを好み、集団を求める傾向", 3: "リーダーシップを取り、意見を主張する力", 4: "エネルギッシュに活動的に動くペース", 5: "スリルや強い刺激を求める傾向", 6: "喜びや楽しさを感じやすい傾向" } },
        'A': { title: "協調性の内訳", color: "bg-green-400", facets: { 1: "信頼", 2: "誠実さ", 3: "利他主義", 4: "順応性", 5: "謙虚さ", 6: "優しい心" }, descs: { 1: "他人の意図が善意であると信じる傾向", 2: "駆け引きをせず、率直で隠し事がない傾向", 3: "他人の幸福を願い、進んで援助する傾向", 4: "対立を避け、他人に譲歩して許す傾向", 5: "自慢をせず、自分を控えめに表現する傾向", 6: "他人の苦しみに共感し、同情する傾向" } },
        'C': { title: "誠実性の内訳", color: "bg-blue-400", facets: { 1: "自己効力感", 2: "秩序性", 3: "義務感", 4: "達成努力", 5: "自己鍛錬", 6: "慎重さ" }, descs: { 1: "物事を成し遂げる能力があると信じる傾向", 2: "整理整頓を好み、計画的に進める傾向", 3: "ルールや道徳的な義務を厳格に守る傾向", 4: "高い目標を設定し、それに向かって努力する傾向", 5: "困難なタスクでも投げ出さずにやり遂げる力", 6: "行動前に結果を予測し、深く考えてから動く傾向" } },
        'N': { title: "神経症的傾向の内訳", color: "bg-purple-400", facets: { 1: "不安", 2: "怒り", 3: "抑うつ", 4: "自意識", 5: "衝動性", 6: "脆弱性" }, descs: { 1: "心配事や恐怖、将来への不安を感じやすい傾向", 2: "イライラしやすく、不満を抱きやすい傾向", 3: "悲しみや孤独感を感じて落ち込みやすい傾向", 4: "他人の目を気にし、恥ずかしさを感じやすい傾向", 5: "強い欲求に抗えず、感情で行動してしまう傾向", 6: "プレッシャーに弱く、パニックになりやすい傾向" } },
        'O': { title: "開放性の内訳", color: "bg-pink-400", facets: { 1: "想像力", 2: "芸術的関心", 3: "感情性", 4: "冒険心", 5: "知性", 6: "進取性" }, descs: { 1: "空想を好み、豊かな内面世界を持つ傾向", 2: "音楽や美術などの美しさに深く感動する傾向", 3: "自分の感情の動きを大切にする傾向", 4: "新しい活動や場所、未知のものを好む傾向", 5: "抽象的なアイデアや知的な遊びを好む傾向", 6: "伝統を疑い、新しい価値観を受け入れる傾向" } }
    };

    function safeParse(field) {
        if (!field) return {};
        if (typeof field === 'string') { try { return JSON.parse(field); } catch(e) { return {}; } }
        return field;
    }
    function safeString(field) { return field ? field : "データなし"; }

    async function initResult() {
        try {
            await liff.init({ liffId: "2009176797-S5FV668D" }); 
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const userId = (await liff.getProfile()).userId;

            const urlParams = new URLSearchParams(window.location.search);
            const testType = urlParams.get('type');

            // 🚀 マイページ等で作ったバックエンドAPIをダブルで呼び出し（爆速キャッシュ仕様）
            const [myRes, allRes] = await Promise.all([
                fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getUserData?userId=${userId}`),
                fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getAllUsersData`)
            ]);
            
            if (myRes.ok && allRes.ok) {
                const userData = await myRes.json();
                const allUsers = await allRes.json();
                if (userData) {
                    setTimeout(() => {
                        displayResult(userData, allUsers, userId, testType);
                    }, 800);
                }
            } else { throw new Error("API通信エラー"); }
        } catch (err) {
            document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">エラーが発生しました: ${err.message}</p>`;
        }
    }

    function displayResult(userData, allUsers, userId, testType) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('result-content').classList.remove('hidden');

        let labels = [], dataPoints = [], maxScore = 7, title = "", text = "", extraHTML = "";
        let showChart = true;

        // 🤖 --- 1. 詳細レポートの作成 (test.htmlと同じロジック) ---
        try {
            if (testType === 'bigfive') {
                title = "Big Five 分析完了 🧠";
                if (!userData.bigFiveScores) { text = safeString(userData.bigFiveResult); showChart = false; } 
                else {
                    const s = safeParse(userData.bigFiveScores);
                    const domains = s.domainScores || s;
                    labels = ['外向性', '協調性', '誠実性', '神経症的傾向', '開放性'];
                    dataPoints = [Number(domains.E||domains.extraversion||0), Number(domains.A||domains.agreeableness||0), Number(domains.C||domains.conscientiousness||0), Number(domains.N||domains.neuroticism||0), Number(domains.O||domains.openness||0)];
                    const isFull = (safeString(userData.latestTest) === "bigfive_full" || !!s.facetScores);
                    maxScore = isFull ? 120 : 7; const mid = maxScore / 2;

                    text = "【 AI先輩の性格傾向分析 】\n";
                    text += (dataPoints[0] >= mid ? "🔥 外向性 [高]：社交的でポジティブなエネルギーに溢れています。\n" : "☕ 外向性 [低]：一人の時間を大切にし、深く考える慎重派です。\n");
                    text += (dataPoints[1] >= mid ? "🤝 協調性 [高]：思いやりがあり、チームの和を大切にします。\n" : "⚔️ 協調性 [低]：合理性を重んじ、自分の意見をしっかり持っています。\n");
                    text += (dataPoints[2] >= mid ? "📋 誠実性 [高]：責任感が強く、計画的に物事を完遂します。\n" : "🌱 誠実性 [低]：型にとらわれず、臨機応変な対応が得意です。\n");
                    text += (dataPoints[3] >= mid ? "🌧️ 神経症的傾向 [高]：些細な変化に気づける、高いリスク察知能力の持ち主です。\n" : "🛡️ 神経症的傾向 [低]：プレッシャーに強く、常にどっしり構える安定感があります。\n");
                    text += (dataPoints[4] >= mid ? "💡 開放性 [高]：好奇心旺盛で、新しいアイデアや挑戦が大好きです。\n" : "🏛️ 開放性 [低]：現実的で、地に足のついた実績や伝統を重んじます。\n");

                    if (isFull && s.facetScores && typeof s.facetScores === 'object') {
                        extraHTML = `<div class="mt-8 border-t border-slate-200 pt-6 text-left"><h5 class="text-base font-black text-slate-800 mb-4">🔬 30項目の詳細レポート</h5><div class="space-y-3">`;
                        const domainInfo = { 'E': { icon: '🔥', name: '外向性' }, 'A': { icon: '🤝', name: '協調性' }, 'C': { icon: '📋', name: '誠実性' }, 'N': { icon: '🌧️', name: '神経症的傾向' }, 'O': { icon: '💡', name: '開放性' } };
                        ['E', 'A', 'C', 'N', 'O'].forEach(key => {
                            const d = FACET_DICT[key]; const fData = s.facetScores[key];
                            if (fData && typeof fData === 'object' && d) {
                                extraHTML += `<details class="group bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"><summary class="flex justify-between items-center p-4 cursor-pointer font-black text-slate-800 list-none [&::-webkit-details-marker]:hidden bg-slate-50 hover:bg-slate-100 transition"><div class="flex items-center gap-2"><span class="text-xl">${domainInfo[key].icon}</span> <span class="text-sm">${domainInfo[key].name}</span></div><span class="transition duration-300 group-open:rotate-180 text-slate-400">▼</span></summary><div class="p-5 border-t border-slate-100 bg-white space-y-5">`;
                                Object.keys(d.facets).forEach((idx, arrayIndex) => {
                                    let score = Number(fData[idx]); if (isNaN(score)) score = Number(Object.values(fData)[arrayIndex]) || 0;
                                    const percent = Math.min(100, Math.max(0, Math.round((score / 20) * 100)));
                                    extraHTML += `<div><div class="flex justify-between items-end mb-2"><span class="text-sm font-bold text-slate-800">${d.facets[idx]}</span><span class="text-xs font-black text-slate-400">${score}/20</span></div><div class="h-2 bg-slate-100 rounded-full overflow-hidden mb-2"><div class="h-full ${d.color} rounded-full" style="width: ${percent}%"></div></div><p class="text-xs text-slate-500 leading-relaxed">${d.descs[idx]}</p></div>`;
                                });
                                extraHTML += `</div></details>`;
                            }
                        });
                        extraHTML += `</div></div>`;
                    }
                }
            } 
            else if (testType === 'motivation') {
                title = "やる気８タイプ 完了 🔥";
                if (!userData.motivationScores) { text = "データがありません。"; showChart = false; } 
                else {
                    const s = safeParse(userData.motivationScores);
                    const resName = safeString(userData.motivationResult).replace('やる気：', '');
                    labels = ['成長思考', '賞賛欲求', '自信']; dataPoints = [Number(s.mindset || 0), Number(s.focus || 0), Number(s.confidence || 0)]; maxScore = 2; 
                    text = `【 ${resName} 】\n\nあなたのモチベーションの源泉を分析しました！\n\n`;
                    text += dataPoints[0] >= 1 ? "🌱 成長思考：高\n困難な課題や新しい知識の吸収に燃えるタイプ。\n\n" : "🌱 成長思考：安定\n無駄な労力をかけず、効率よく目標を達成するプロセスにやりがいを感じるタイプ。\n\n";
                    text += dataPoints[1] >= 1 ? "👀 賞賛欲求：高\n人から認められ、褒められると120%の力を発揮します！\n\n" : "👀 賞賛欲求：内発的\n他人の評価より自分が納得するクオリティをとことん追求する職人肌です。\n\n";
                    text += dataPoints[2] >= 1 ? "✨ 自信：高\nプレッシャーのかかる場面でも物怖じせず挑戦できます。\n\n" : "✨ 自信：慎重\nリスクを事前に察知し、綿密な計画を立てるサポーター気質です。\n\n";
                }
            } 
            else if (testType === 'chronotype') {
                showChart = false; title = "クロノタイプ 完了 ⏰";
                const t = safeString(userData.chronoResult);
                let desc = "", routine = "";
                if(t.includes('ライオン')) { desc = "【 ライオン型（朝型）🦁 】\n全人口の15〜20%を占める生粋の朝型。目覚めとともにエネルギーが全開になります。"; routine = "05:30 起床して朝食\n06:00 - 09:00 集中仕事（🔥 ゴールデンタイム）\n09:00 - 10:00 カフェイン投入\n10:00 - 12:00 会議や雑用\n12:00 昼食\n13:00 - 17:00 創造的な仕事\n17:00 - 18:00 エクササイズ\n22:30 就寝"; } 
                else if(t.includes('クマ')) { desc = "【 クマ型（昼型）🐻 】\n全人口の50%を占める標準的な昼型。親切で開放的な性格が多いです。"; routine = "07:00 起床して運動\n07:30 朝食\n09:00 - 10:00 カフェイン投入\n10:00 - 12:00 集中仕事（🔥 ゴールデンタイム）\n12:00 昼食\n15:00 - 18:00 会議や雑用\n18:00 - 19:00 エクササイズ\n20:00 - 22:00 創造的な仕事\n23:00 就寝"; } 
                else if(t.includes('オオカミ')) { desc = "【 オオカミ型（夜型）🐺 】\n全人口の15〜20%の夜型。夕方以降に集中力と創造性がピークに達するクリエイター気質です。"; routine = "07:30 起床して朝食\n08:30 軽い運動\n11:00 - 13:00 雑用\n13:00 昼食\n15:00 - 18:00 集中仕事\n18:00 - 19:00 エクササイズ\n21:00 - 23:00 創造的な仕事（🔥 ゴールデンタイム）\n24:00 就寝"; } 
                else if(t.includes('イルカ')) { desc = "【 イルカ型（不規則型）🐬 】\n全人口の10%の不規則型。眠りが浅く神経質ですが、知性が高く完璧主義な一面があります。"; routine = "06:30 起床して運動\n07:30 朝食\n09:30 カフェイン投入\n10:00 - 12:00 創造的な仕事\n12:00 昼食\n13:00 - 16:00 雑用\n17:00 - 18:00 集中仕事（🔥 ゴールデンタイム）\n18:00 瞑想\n23:30 就寝"; }
                if(desc) { text = desc; extraHTML = `<div class="mt-6"><h5 class="text-base font-black text-slate-800 mb-3 flex items-center gap-2"><span>🗓️</span> 理想のスケジュール</h5><div class="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-sm"><p class="text-sm text-slate-700 font-bold leading-loose whitespace-pre-wrap break-words">${routine}</p></div></div>`; } 
                else { text = t; }
            }
            else if (testType === 'coffee') {
                showChart = false; title = "コーヒー性格 完了 ☕";
                const t = safeString(userData.coffeeResult);
                let desc = "", strong = "", weak = "", psycho = "";
                if(t.includes('ブラック')) { desc = "【 ブラックコーヒー ☕ 】\n苦味をそのまま受け入れる、合理的でストレートな性格。"; strong = "無駄を嫌い、効率を重んじて物事をシンプルに解決する能力に長けています。"; weak = "他人のやり方に合わせるのが苦手で、少し頑固になりがちです。"; psycho = "白黒はっきりさせたい「合理主義」の傾向。"; } 
                else if(t.includes('カフェラテ')) { desc = "【 カフェラテ（ミルク入り） 🥛 】\nコーヒーの苦味をミルクで和らげるように、人生のストレスも和らげようとする平和主義者。"; strong = "非常に協調性が高く、人間関係の潤滑油になれる天性の優しさがあります。"; weak = "他人のために自分を犠牲にしすぎたり、頼み事を断れずにキャパオーバーになりがちです。"; psycho = "「苦痛を和らげたい」という深層心理があり、「ギバー（与える人）」の傾向が強いです。"; } 
                else if(t.includes('フローズン')) { desc = "【 フローズン / ブレンド 🧊 】\n新しい刺激や甘いご褒美を求める、好奇心旺盛なトレンドセッター。"; strong = "子どものような豊かな想像力を持ち、直感やひらめきでゼロからイチを生み出すのが得意です。"; weak = "計画性がやや低く、目先の楽しさや安易な解決策に飛びついて無謀な選択をしやすい一面があります。"; psycho = "心理学でいう「刺激希求性」が非常に高く、変化のあるクリエイティブな場面で輝きます。"; } 
                else if(t.includes('特殊')) { desc = "【 特殊オーダー ✨ 】\n自分の体調やルールのコントロールを重視する、こだわりの強い完璧主義タイプ。"; strong = "健康意識が高く、自分の状態を客観的に分析して正しい選択ができる自立心があります。"; weak = "秩序やルールにこだわりすぎるあまり、予定が狂うと強いストレスを感じやすいです。"; psycho = "「コントロール欲求」が高く、自分の環境を細部まで管理したい傾向があります。"; } 
                else if(t.includes('インスタント')) { desc = "【 インスタントコーヒー 🍵 】\n手軽さや伝統的な方法を好む、究極のマイペース＆のんびり屋。"; strong = "どんな状況でも気楽に構えることができ、圧倒的なスルースキルを持っています。"; weak = "大事な決断やタスクをつい後回しにしてしまう、先延ばし癖があります。"; psycho = "「現状維持バイアス」が強く、効率や新しさよりも「いつもの安心感」を優先します。"; }
                if(desc) { text = desc; extraHTML = `<div class="mt-6 space-y-4"><div class="bg-orange-50 p-5 rounded-2xl border border-orange-100"><h5 class="text-sm font-black text-orange-600 mb-2 flex items-center gap-2"><span>✨</span> 長所 (強み)</h5><p class="text-sm text-slate-700 font-medium leading-relaxed">${strong}</p></div><div class="bg-blue-50 p-5 rounded-2xl border border-blue-100"><h5 class="text-sm font-black text-blue-600 mb-2 flex items-center gap-2"><span>💦</span> 短所 (注意点)</h5><p class="text-sm text-slate-700 font-medium leading-relaxed">${weak}</p></div></div>`; } 
                else { text = t; }
            }
            else if (testType === 'sm') {
                showChart = false; title = "空気読めるか診断 完了 🌬️";
                if (!userData.smScores) { text = "データがありません。"; } 
                else {
                    const s = safeParse(userData.smScores);
                    let typeName = s.total >= 32.5 ? "HSM（空気を読むのが得意なタイプ）" : "LSM（自分を貫くマイペースタイプ）";
                    let typeDesc = s.total >= 32.5 ? "周囲の状況や他人の感情に敏感で、その場に合わせて柔軟に自分を演出できる「カメレオン」のような才能があります。" : "他人の目や周囲の空気に流されず、自分の信念やスタイルを貫ける芯の強さがあります。";
                    text = `【 診断結果：${typeName} 】\n\n${typeDesc}\n\n`;
                    const pTotal = Math.round((s.total / 52) * 100); const pRead = Math.round((s.readMind / 24) * 100); const pAct = Math.round((s.adaptAct / 28) * 100);
                    extraHTML = `<div class="mt-6 bg-slate-50 p-6 rounded-3xl border border-slate-200"><h5 class="text-base font-black text-slate-800 mb-6">📊 あなたのスコア詳細</h5><div class="mb-6"><div class="flex justify-between items-end mb-2"><span class="text-sm font-bold text-slate-700">🏆 総合スコア (平均32.5)</span><span class="text-base font-black text-blue-600">${s.total} / 52点</span></div><div class="h-3 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-blue-500 rounded-full" style="width: ${pTotal}%"></div></div></div><div class="mb-6"><div class="flex justify-between items-end mb-2"><span class="text-sm font-bold text-slate-700">👀 心を読む力</span><span class="text-base font-black text-pink-500">${s.readMind} / 24点</span></div><div class="h-3 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-pink-500 rounded-full" style="width: ${pRead}%"></div></div></div><div><div class="flex justify-between items-end mb-2"><span class="text-sm font-bold text-slate-700">🎭 演出する力</span><span class="text-base font-black text-emerald-500">${s.adaptAct} / 28点</span></div><div class="h-3 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-emerald-500 rounded-full" style="width: ${pAct}%"></div></div></div></div>`;
                }
            }
            else if (testType === 'nomophobia') {
                showChart = false; title = "スマホ依存チェック 📱";
                if (!userData.nomophobiaScores) { text = "データがありません。"; } 
                else {
                    const s = safeParse(userData.nomophobiaScores);
                    let level = "", desc = "", color = "";
                    if (s.total <= 27) { level = "問題なし"; desc = "素晴らしい！スマホと適切な距離を保てています。"; color = "bg-green-500"; }
                    else if (s.total <= 55) { level = "依存予備軍"; desc = "少し注意が必要です。意識してデジタルデトックスの時間を持ちましょう。"; color = "bg-yellow-500"; }
                    else if (s.total <= 83) { level = "軽度の依存症"; desc = "スマホがないと落ち着かない状態です。1日の使用時間を制限してみましょう。"; color = "bg-orange-500"; }
                    else { level = "重度以上の依存症"; desc = "かなり依存しています。睡眠や日常生活に悪影響が出ている可能性があります。"; color = "bg-red-500"; }
                    text = `【 診断結果：${level} 】\n\n${desc}\n\n`;
                    const percent = Math.min(100, Math.round((s.total / 140) * 100));
                    extraHTML = `<div class="mt-6 bg-slate-50 p-6 rounded-3xl border border-slate-200"><h5 class="text-base font-black text-slate-800 mb-5">📶 依存度メーター</h5><div class="mb-3"><div class="flex justify-between items-end mb-2"><span class="text-sm font-bold text-slate-700">危険度スコア</span><span class="text-lg font-black ${color.replace('bg-', 'text-')}">${s.total} / 140点</span></div><div class="h-4 bg-slate-200 rounded-full overflow-hidden shadow-inner"><div class="h-full ${color} rounded-full" style="width: ${percent}%"></div></div></div><div class="flex justify-between text-xs font-bold text-slate-400 px-1"><span>安全</span><span>危険</span></div></div>`;
                }
            }

            document.getElementById('result-title').innerText = title;
            document.getElementById('result-text').innerHTML = text.replace(/\n/g, '<br>');
            document.getElementById('extra-html-container').innerHTML = extraHTML;

            // チャートの描画
            const chartContainer = document.getElementById('chart-container');
            if (showChart) {
                chartContainer.style.display = 'block';
                const ctx = document.getElementById('radarChart').getContext('2d');
                myChart = new Chart(ctx, {
                    type: 'radar',
                    data: { labels: labels, datasets: [{ label: 'スコア', data: dataPoints, backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: 'rgba(99, 102, 241, 1)', pointBackgroundColor: 'rgba(99, 102, 241, 1)', borderWidth: 2 }] },
                    options: { scales: { r: { min: 0, max: maxScore, ticks: { stepSize: maxScore/5, display: false }, pointLabels: { font: { family: 'Zen Maru Gothic', size: 11, weight: 'bold' } } } }, plugins: { legend: { display: false } } }
                });
            } else { chartContainer.style.display = 'none'; }

            // 🤝 --- 2. 同じタイプのゼミ生を探す ---
            if (testType !== 'nomophobia') { // スマホ依存度には同じタイプ表示をスキップ
                let matchValue = "", resultField = "";
                if (testType === 'chronotype' && userData.chronoResult) { matchValue = userData.chronoResult.split('（')[0]; resultField = 'chronoResult'; }
                else if (testType === 'bigfive' && userData.bigFiveResult) { const m = userData.bigFiveResult.match(/Big Five：(.+?)が特徴的/); if (m) matchValue = m[1]; resultField = 'bigFiveResult'; }
                else if (testType === 'coffee' && userData.coffeeResult) { matchValue = userData.coffeeResult.split(' ')[0]; resultField = 'coffeeResult'; }
                else if (testType === 'sm' && userData.smResult) { matchValue = userData.smResult.split('（')[0]; resultField = 'smResult'; }
                else if (testType === 'motivation' && userData.motivationResult) { matchValue = userData.motivationResult.replace('やる気：', ''); resultField = 'motivationResult'; }

                if (matchValue) {
                    const similarUsers = allUsers.filter(u => u.id !== userId && (u[resultField] || "").includes(matchValue));
                    document.getElementById('similar-users-section').classList.remove('hidden');
                    
                    const container = document.getElementById('similar-users-list');
                    if (similarUsers.length === 0) {
                        container.innerHTML = `<p class="text-xs text-slate-400 font-bold py-2">まだ同じタイプの仲間がいません。</p>`;
                    } else {
                        let simHtml = "";
                        similarUsers.forEach(user => {
                            const topRole = (user.roles && user.roles.length > 0 && user.roles[0] !== "一般メンバー" && user.roles[0] !== "未設定") ? user.roles[0] : "メンバー";
                            simHtml += `
                                <div onclick="alert('ポータルのマイページやカレンダーから詳しいプロフィールを見てみよう！')" class="flex-shrink-0 w-24 bg-slate-50 border border-slate-100 rounded-xl p-2 flex flex-col items-center cursor-pointer active:scale-95 transition shadow-sm">
                                    <img src="${user.icon}" class="w-10 h-10 rounded-full object-cover border border-slate-200 mb-1">
                                    <span class="text-[10px] font-black text-slate-700 truncate w-full text-center">${user.name}</span>
                                    <span class="bg-indigo-50 text-indigo-500 border border-indigo-200 text-[8px] px-1.5 py-0.5 rounded shadow-sm mt-1 truncate w-full text-center">${topRole}</span>
                                </div>
                            `;
                        });
                        container.innerHTML = simHtml;
                    }
                }
            }
        } catch (e) { console.error(e); }
    }

    initResult();
    </script>
</body>
</html>
