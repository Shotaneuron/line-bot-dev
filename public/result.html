<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>診断結果 | 北大心理ゼミ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background: #f0fdfa; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .btn-hover { transition: transform 0.2s; }
        .btn-hover:active { transform: scale(0.96); }
        /* ふわっと表示させるアニメーション */
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="safe-area-inset-top p-5">

    <header class="text-center mb-6 pt-4 fade-in">
        <p class="text-[10px] font-black text-sky-500 tracking-[0.3em] mb-1 uppercase">Result</p>
        <h1 class="text-2xl font-black text-slate-800 tracking-tight">診断完了！ 🎉</h1>
    </header>

    <main class="flex-1 flex flex-col justify-center">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin text-4xl mb-4">🌀</div>
            <p class="font-black text-slate-500 tracking-widest">結果を分析中...</p>
        </div>

        <div id="result-content" class="hidden fade-in">
            <div class="glass-card w-full rounded-[2rem] p-6 mb-8">
                <h3 id="result-title" class="text-lg font-black text-slate-800 mb-4 text-center border-b-2 border-slate-100 pb-3"></h3>
                
                <div class="w-full aspect-square mb-6 bg-slate-50 rounded-2xl p-2 relative">
                    <canvas id="radarChart"></canvas>
                </div>
                
                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                    <h4 class="text-xs font-black text-indigo-600 mb-2 flex items-center"><span class="text-base mr-1">🤖</span> AI先輩の分析</h4>
                    <p id="result-text" class="text-xs text-slate-700 font-bold leading-relaxed whitespace-pre-wrap"></p>
                </div>
            </div>

            <div class="flex gap-3 mt-6 border-t border-slate-100 pt-6">
                <button onclick="shareOnX()" class="flex-1 bg-black text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 transition shadow-sm text-sm">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    Xで結果をシェア
                </button>
                
                <button onclick="shareOnLINE()" class="flex-1 bg-[#06C755] text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 transition shadow-sm text-sm">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.12.292.031.753-.021 1.07l-.234 1.411c-.066.425-.325 1.564 1.369.851 1.693-.711 9.157-5.385 11.458-9.01.222-.352.335-.71.335-1.07v-3.452z"/></svg>
                    LINEで友達に教える
                </button>
            </div>

            <script>
            // 診断テストのトップページ（またはLINE登録用URL）
            const SHARE_URL = "[https://liff.line.me/あなたのLIFF_ID](https://liff.line.me/あなたのLIFF_ID)"; // ← 適切なURLに変更してください！

            function getShareText() {
                // 例：画面上の診断結果のテキストを取得（id="result-type" などの要素から引っ張る）
                // ※実際のHTMLのIDに合わせて適宜書き換えてください
                const typeName = document.getElementById('result-type') ? document.getElementById('result-type').innerText : "〇〇タイプ"; 
                
                return `北大心理ゼミの心理診断で、私の結果は「${typeName}」でした！🧠✨\n\nあなたも自分の心理タイプを診断してみよう👇\n`;
            }

            function shareOnX() {
                const text = encodeURIComponent(getShareText());
                const url = encodeURIComponent(SHARE_URL);
                // Xの投稿画面を別タブで開く
                window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
            }

            function shareOnLINE() {
                const text = encodeURIComponent(getShareText() + SHARE_URL);
                // LINEの友達選択画面（シェア）を開く
                window.open(`https://line.me/R/msg/text/?${text}`, '_blank');
            }
            </script>

            <button onclick="window.location.href='test.html'" class="w-full bg-slate-800 text-white text-sm font-black py-4 rounded-2xl shadow-lg btn-hover flex justify-center items-center">
                🏠 ホーム（ポータル）へ戻る
            </button>
        </div>
    </main>

    <script>
    let myChart = null;

    async function initResult() {
        try {
            await liff.init({ liffId: "2009176797-S5FV668D" }); 
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const userId = (await liff.getProfile()).userId;

            const urlParams = new URLSearchParams(window.location.search);
            const testType = urlParams.get('type');

            const url = `https://firestore.googleapis.com/v1/projects/shinrizemi-linebot/databases/default/documents/users/${userId}`;
            const res = await fetch(url);
            
            if (res.ok) {
                const json = await res.json();
                if (json.fields) {
                    setTimeout(() => {
                        displayResult(json.fields, testType);
                    }, 800);
                }
            }
        } catch (err) {
            document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">エラーが発生しました: ${err.message}</p>`;
        }
    }

    function displayResult(userData, testType) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('result-content').classList.remove('hidden');

        let labels = [], dataPoints = [], maxScore = 7, title = "", text = "";
        let showChart = true;

        if (testType === 'bigfive' && userData.bigFiveScores) {
            const s = JSON.parse(userData.bigFiveScores.stringValue);
            const domains = s.domainScores || s;
            labels = ['外向性', '協調性', '誠実性', '神経症的傾向', '開放性'];
            dataPoints = [domains.extraversion, domains.agreeableness, domains.conscientiousness, domains.neuroticism, domains.openness];
            const version = userData.bigFiveVersion ? userData.bigFiveVersion.stringValue : 'short';
            maxScore = (version === 'full' || s.domainScores) ? 120 : 7;
            title = "Big Five 分析完了 🧠";
            text = "世界基準の「5因子」のスコアが算出されました！\n\nレーダーチャートが外に広がっている項目が、あなたの基本的な強みです。\n\n🎉 さらに！\n120問お答えいただいたあなたには【30項目の詳細な性格パラメーター】も裏側で算出されています！\n\n下のボタンから「ホーム（ポータル）」に戻り、詳細レポートを確認してみましょう✨";
        } 
        else if (testType === 'motivation' && userData.motivationScores) {
            const s = JSON.parse(userData.motivationScores.stringValue);
            labels = ['成長思考', '賞賛欲求', '自信'];
            dataPoints = [s.mindset, s.focus, s.confidence];
            maxScore = 2;
            title = "やる気８タイプ 分析完了 🔥";
            text = "あなたの「やる気スイッチ」を構成する3つの要素です！\n\n自分がどんな時に頑張れるかを知ることで、大学生活のモチベーションを自在にコントロールできるようになります！\n\n下のボタンからポータルに戻り、詳しい解説をチェックしてください！";
        }
        else if (testType === 'chronotype') {
            showChart = false;
            title = "クロノタイプ 分析完了 ⏰";
            const typeStr = userData.chronoResult ? userData.chronoResult.stringValue : "";
            document.getElementById('radarChart').parentElement.style.display = 'none';
            text = `あなたの遺伝的な体内時計は\n【 ${typeStr} 】です！\n\nあなたの集中力が最も高まる「ゴールデンタイム」や、大学生活での最強の過ごし方をポータル画面にまとめました。\n\n下のボタンからポータルへ戻って、詳細なアドバイスを確認してみましょう！`;
        }
        else if (testType === 'coffee') {
            showChart = false;
            title = "コーヒー性格テスト ☕";
            const typeStr = userData.coffeeResult ? userData.coffeeResult.stringValue : "";
            document.getElementById('radarChart').parentElement.style.display = 'none';
            text = `あなたの性格は…\n【 ${typeStr} 】好きタイプ！\n\nこのタイプが持つ「意外な強み」と「人間関係の落とし穴」を分析しました。\n\n下のボタンからポータルへ戻って、詳しい診断結果を読んでみましょう！`;
        }
        // ★新規追加：空気読めるか診断
        else if (testType === 'sm') {
            showChart = false;
            title = "空気読めるか診断 完了 🌬️";
            const typeStr = userData.smResult ? userData.smResult.stringValue.split('（')[0] : "";
            document.getElementById('radarChart').parentElement.style.display = 'none';
            text = `あなたのカメレオン度は…\n【 ${typeStr} 】タイプ！\n\n他人の心を読む力と、自分を演出する力の詳細なスコアをポータル画面にまとめました。\n\n下のボタンからポータルへ戻って確認してみましょう！`;
        }
        // ★新規追加：スマホ依存チェック
        else if (testType === 'nomophobia') {
            showChart = false;
            title = "スマホ依存チェック 完了 📱";
            const typeStr = userData.nomophobiaResult ? userData.nomophobiaResult.stringValue : "";
            document.getElementById('radarChart').parentElement.style.display = 'none';
            text = `あなたの危険度は…\n【 ${typeStr} 】です！\n\n140点満点の「依存度メーター」と詳細な分析をポータル画面にまとめました。\n\n下のボタンからポータルへ戻って、結果を確認してみましょう！`;
        }

        document.getElementById('result-title').innerText = title;
        document.getElementById('result-text').innerText = text;

        if (showChart) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{ label: 'スコア', data: dataPoints, backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: 'rgba(99, 102, 241, 1)', pointBackgroundColor: 'rgba(99, 102, 241, 1)', borderWidth: 2 }]
                },
                options: { scales: { r: { min: 0, max: maxScore, ticks: { stepSize: maxScore/5, display: false }, pointLabels: { font: { family: 'Zen Maru Gothic', size: 11, weight: 'bold' } } } }, plugins: { legend: { display: false } } }
            });
        }
    }

    initResult();
    </script>
</body>
</html>
