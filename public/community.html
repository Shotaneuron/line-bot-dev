<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>冒険者ギルド - 北大心理ゼミ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --guild-gold: #fbbf24; --guild-bg: #0f172a; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: var(--guild-bg); color: #f8fafc; overflow-x: hidden; }
        .font-serif-jp { font-family: 'Noto Serif JP', serif; }
        
        /* ギルドの重厚なテクスチャ */
        .guild-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 2px solid #334155; box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(251, 191, 36, 0.1); }
        .gold-border { border-color: var(--guild-gold); box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        
        /* アニメーション */
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .float { animation: floating 4s ease-in-out infinite; }
        
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }
        .claim-ready { animation: pulse-gold 2s infinite; background: var(--guild-gold) !important; color: var(--guild-bg) !important; }

        /* レベルアップフラッシュ */
        #level-up-overlay { display: none; position: fixed; inset: 0; background: rgba(251, 191, 36, 0.3); z-index: 100; animation: flash 0.5s ease-out; }
        @keyframes flash { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        .exp-bar-inner { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        /* クエストボード用紙風 */
        .quest-paper { background: #fef3c7; color: #78350f; border-left: 4px solid #b45309; }
    </style>
</head>
<body class="pb-10">

    <div id="level-up-overlay"></div>

    <div id="loading" class="fixed inset-0 bg-slate-900 z-50 flex flex-col justify-center items-center">
        <div class="animate-bounce text-4xl mb-4">🏰</div>
        <p class="text-amber-400 font-black tracking-widest animate-pulse">ギルドへ入館中...</p>
    </div>

    <main id="app-content" class="p-5 space-y-6 max-w-lg mx-auto hidden">
        
        <header class="text-center pt-4 mb-8">
            <div class="inline-block relative">
                <h1 class="text-3xl font-black font-serif-jp tracking-tighter text-amber-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">北大心理ゼミ</h1>
                <div class="h-1 w-full bg-gradient-to-r from-transparent via-amber-500 to-transparent mt-1"></div>
            </div>
            <p class="text-[9px] font-black text-amber-200/60 mt-2 tracking-[0.2em] uppercase">The Practice of Academic Discipline</p>
            <p class="text-[10px] font-bold text-slate-400 mt-1 italic">～知識を行動に変え未来を発掘する～</p>
        </header>

        <section class="guild-card rounded-[2.5rem] p-6 float relative">
            <div class="absolute top-2 right-6 text-[40px] opacity-10">🛡️</div>
            
            <div class="flex items-center gap-5 mb-6">
                <div class="relative">
                    <div class="absolute -inset-1 bg-amber-500 rounded-full blur opacity-25"></div>
                    <img id="user-icon" src="" class="w-20 h-20 rounded-full border-4 border-slate-700 object-cover relative z-10">
                    <div class="absolute -bottom-1 -right-1 bg-amber-500 text-slate-900 px-2 py-0.5 rounded-full text-[10px] font-black z-20 shadow-lg">Lv.<span id="user-level">1</span></div>
                </div>
                <div>
                    <p id="user-title" class="text-[10px] font-black text-amber-400 mb-1 animate-pulse">称号を鑑定中...</p>
                    <h2 id="user-name" class="text-2xl font-black text-white">冒険者</h2>
                    <p id="user-rank" class="text-[10px] text-slate-400 font-bold bg-slate-800/50 px-2 py-0.5 rounded mt-1 inline-block">RANK: BRONZE</p>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between text-[10px] font-black text-amber-200/50 uppercase tracking-tighter">
                    <span>Experience Points</span>
                    <span id="exp-text">0 / 500</span>
                </div>
                <div class="h-4 w-full bg-slate-900 rounded-full p-1 border border-slate-700 shadow-inner">
                    <div id="exp-bar" class="h-full bg-gradient-to-r from-amber-600 via-amber-400 to-yellow-300 rounded-full exp-bar-inner w-0 relative overflow-hidden">
                        <div class="absolute inset-0 bg-white/20 animate-[shimmer_2s_infinite]"></div>
                    </div>
                </div>
            </div>
        </header>

        <button id="btn-login" onclick="claimLoginBonus()" class="w-full bg-slate-800 border-2 border-slate-600 py-4 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition shadow-lg group">
            <span class="text-2xl group-hover:rotate-12 transition">🍺</span>
            <div class="text-left">
                <p class="text-[10px] font-black text-slate-400 leading-none mb-1">DAILY ATTENDANCE</p>
                <p class="text-sm font-black text-white leading-none">ギルドに出勤する (＋50 EXP)</p>
            </div>
        </button>

        <section class="space-y-4">
            <div class="flex items-center gap-2 px-2">
                <span class="text-amber-500">📜</span>
                <h3 class="text-sm font-black text-white tracking-widest">クエスト掲示板</h3>
            </div>

            <div id="quest-list" class="space-y-3">
                <div id="q-profile" class="quest-paper p-4 rounded-2xl flex justify-between items-center opacity-50 transition-all duration-500">
                    <div>
                        <h4 class="text-sm font-black">📜 初歩の自己紹介</h4>
                        <p class="text-[10px] font-bold opacity-70">マイページでプロフィールを完成させよ</p>
                    </div>
                    <button onclick="claimQuest('profile', 200)" class="btn-claim px-4 py-2 bg-slate-300 text-slate-500 rounded-xl text-xs font-black disabled:cursor-not-allowed" disabled>未達成</button>
                </div>

                <div id="q-bigfive" class="quest-paper p-4 rounded-2xl flex justify-between items-center opacity-50 transition-all duration-500">
                    <div>
                        <h4 class="text-sm font-black">🔍 自己の深淵を覗く</h4>
                        <p class="text-[10px] font-bold opacity-70">心理テスト「Big Five」を完了せよ</p>
                    </div>
                    <button onclick="claimQuest('bigfive', 300)" class="btn-claim px-4 py-2 bg-slate-300 text-slate-500 rounded-xl text-xs font-black" disabled>未達成</button>
                </div>

                <div id="q-event" class="quest-paper p-4 rounded-2xl flex justify-between items-center opacity-50 transition-all duration-500">
                    <div>
                        <h4 class="text-sm font-black">⚔️ 実践への第一歩</h4>
                        <p class="text-[10px] font-bold opacity-70">ゼミのイベントに1回参加せよ</p>
                    </div>
                    <button onclick="claimQuest('event', 500)" class="btn-claim px-4 py-2 bg-slate-300 text-slate-500 rounded-xl text-xs font-black" disabled>未達成</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        let myUserId = "";
        let myData = null;
        let totalExp = 0;
        const LV_STEP = 500;

        async function initCommunity() {
            try {
                await liff.init({ liffId: "2009176797-tgpGsUUz" }); 
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                myUserId = profile.userId;

                document.getElementById('user-icon').src = profile.pictureUrl;
                document.getElementById('user-name').innerText = profile.displayName;

                // データの取得
                const [userRes, eventRes] = await Promise.all([
                    fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getUserData?userId=${myUserId}`),
                    fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getUserEvents?userId=${myUserId}`)
                ]);

                if (userRes.ok && eventRes.ok) {
                    myData = await userRes.json();
                    const eventData = await eventRes.json();
                    
                    // 初期経験値の計算（バックエンド連動前なのでロジックで仮算出）
                    const pastCount = eventData.past ? eventData.past.length : 0;
                    totalExp = (pastCount * 100); 

                    // 既に獲得済みのEXPをlocalStorageから反映
                    totalExp += parseInt(localStorage.getItem('claimed_exp_' + myUserId) || 0);

                    updateStatusUI();
                    checkQuests(myData, eventData);
                    checkLoginStatus();
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');

            } catch (err) { console.error(err); }
        }

        function updateStatusUI() {
            const level = Math.floor(totalExp / LV_STEP) + 1;
            const currentLevelExp = totalExp % LV_STEP;
            const percent = (currentLevelExp / LV_STEP) * 100;

            const oldLevel = parseInt(document.getElementById('user-level').innerText);
            if (level > oldLevel && oldLevel !== 0) {
                triggerLevelUpEffect();
            }

            document.getElementById('user-level').innerText = level;
            document.getElementById('exp-text').innerText = `${currentLevelExp} / ${LV_STEP}`;
            document.getElementById('exp-bar').style.width = `${percent}%`;

            // ランク判定
            const rankEl = document.getElementById('user-rank');
            if (level >= 10) { rankEl.innerText = "RANK: GOLD"; rankEl.className = "text-[10px] text-amber-400 font-bold bg-amber-900/50 px-2 py-0.5 rounded mt-1 inline-block border border-amber-500"; }
            else if (level >= 5) { rankEl.innerText = "RANK: SILVER"; rankEl.className = "text-[10px] text-slate-200 font-bold bg-slate-700/50 px-2 py-0.5 rounded mt-1 inline-block border border-slate-400"; }

            // 称号
            if (myData) {
                let title = "見習い冒険者";
                if(myData.chronoResult?.includes("オオカミ")) title = "夜を統べる魔術師";
                if(myData.chronoResult?.includes("ライオン")) title = "暁の聖騎士";
                if(myData.coffeeResult?.includes("ブラック")) title = "不屈の戦士";
                document.getElementById('user-title').innerText = `【 ${title} 】`;
            }
        }

        function checkQuests(data, events) {
            const quests = [
                { id: 'profile', condition: data.profile && data.profile.uni, el: 'q-profile' },
                { id: 'bigfive', condition: data.bigFiveResult, el: 'q-bigfive' },
                { id: 'event', condition: events.past && events.past.length > 0, el: 'q-event' }
            ];

            quests.forEach(q => {
                const isClaimed = localStorage.getItem(`quest_${q.id}_${myUserId}`);
                if (isClaimed) {
                    document.getElementById(q.el).style.display = 'none'; // 獲得済みは消去
                } else if (q.condition) {
                    const row = document.getElementById(q.el);
                    row.classList.remove('opacity-50');
                    row.classList.add('gold-border');
                    const btn = row.querySelector('.btn-claim');
                    btn.innerText = "報酬受取！";
                    btn.classList.add('claim-ready');
                    btn.disabled = false;
                }
            });
        }

        function claimQuest(id, exp) {
            totalExp += exp;
            localStorage.setItem(`quest_${id}_${myUserId}`, 'true');
            localStorage.setItem('claimed_exp_' + myUserId, (parseInt(localStorage.getItem('claimed_exp_' + myUserId) || 0) + exp));
            
            const row = document.getElementById(`q-${id}`);
            row.style.transform = "scale(1.1)";
            row.style.opacity = "0";
            setTimeout(() => {
                row.style.display = "none";
                updateStatusUI();
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#fbbf24', '#ffffff'] });
            }, 500);
        }

        function checkLoginStatus() {
            const lastLogin = localStorage.getItem('last_login_' + myUserId);
            const today = new Date().toDateString();
            if (lastLogin === today) {
                const btn = document.getElementById('btn-login');
                btn.disabled = true;
                btn.opacity = "0.5";
                btn.querySelector('p:last-child').innerText = "本日の出勤済み";
            }
        }

        function claimLoginBonus() {
            totalExp += 50;
            const today = new Date().toDateString();
            localStorage.setItem('last_login_' + myUserId, today);
            localStorage.setItem('claimed_exp_' + myUserId, (parseInt(localStorage.getItem('claimed_exp_' + myUserId) || 0) + 50));
            
            checkLoginStatus();
            updateStatusUI();
            
            // 浮遊する "+50" エフェクト
            const effect = document.createElement('div');
            effect.innerText = "+50 EXP";
            effect.className = "fixed text-amber-400 font-black z-[100] animate-[floatUp_1s_ease-out_forwards]";
            effect.style.left = "50%";
            effect.style.top = "50%";
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 1000);
        }

        function triggerLevelUpEffect() {
            const overlay = document.getElementById('level-up-overlay');
            overlay.style.display = 'block';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
            
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#fbbf24', '#f59e0b', '#ffffff'] });
            
            // 簡易的な通知
            const msg = document.createElement('div');
            msg.innerHTML = `<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[110] text-center">
                <p class="text-6xl font-black text-amber-400 italic font-serif-jp animate-bounce shadow-xl">LEVEL UP!</p>
            </div>`;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2500);
        }

        window.onload = initCommunity;
    </script>

    <style>
        @keyframes floatUp { from { opacity: 1; transform: translate(-50%, -50%); } to { opacity: 0; transform: translate(-50%, -150%); } }
    </style>
</body>
</html>
