<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>冒険者ギルド - 北大心理ゼミ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --guild-gold: #fbbf24; --guild-bg: #0f172a; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: var(--guild-bg); color: #f8fafc; overflow-x: hidden; }
        .font-serif-jp { font-family: 'Noto Serif JP', serif; }
        
        .guild-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 2px solid #334155; box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(251, 191, 36, 0.1); }
        .gold-border { border-color: var(--guild-gold); box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }
        .claim-ready { animation: pulse-gold 2s infinite; background: var(--guild-gold) !important; color: var(--guild-bg) !important; cursor: pointer; }

        .quest-paper { background: #fef3c7; color: #78350f; border-left: 4px solid #b45309; }
        .quest-completed { background: #1e293b; color: #64748b; border-left: 4px solid #334155; opacity: 0.8; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* タブ切り替えアニメーション */
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <div id="loading" class="fixed inset-0 bg-slate-900 z-50 flex flex-col justify-center items-center">
        <div class="animate-bounce text-4xl mb-4">🏰</div>
        <p class="text-amber-400 font-black tracking-widest animate-pulse">ギルドへ入館中...</p>
    </div>

    <header class="text-center pt-4 mb-4">
        <div class="inline-block relative">
            <h1 class="text-[28px] font-black font-serif-jp tracking-[0.15em] text-amber-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">北大心理ゼミ</h1>
            <div class="h-1 w-full bg-gradient-to-r from-transparent via-amber-500 to-transparent mt-1"></div>
        </div>
        <p class="text-[9px] font-black text-amber-200/60 mt-2 tracking-[0.2em] uppercase">The Practice of Academic Discipline</p>
    </header>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-700 z-40 pb-safe">
        <div class="flex justify-around items-center h-16 max-w-lg mx-auto">
            <button onclick="switchTab('home')" class="tab-btn flex flex-col items-center gap-1 w-1/4 text-amber-400" id="btn-home">
                <span class="text-xl">🛡️</span><span class="text-[9px] font-bold">ステータス</span>
            </button>
            <button onclick="switchTab('quests')" class="tab-btn flex flex-col items-center gap-1 w-1/4 text-slate-500 hover:text-amber-200 transition" id="btn-quests">
                <span class="text-xl">📜</span><span class="text-[9px] font-bold">クエスト</span>
            </button>
            <button onclick="switchTab('ranking')" class="tab-btn flex flex-col items-center gap-1 w-1/4 text-slate-500 hover:text-amber-200 transition" id="btn-ranking">
                <span class="text-xl">🏆</span><span class="text-[9px] font-bold">ギルド名簿</span>
            </button>
            <button onclick="switchTab('buddies')" class="tab-btn flex flex-col items-center gap-1 w-1/4 text-slate-500 hover:text-amber-200 transition" id="btn-buddies">
                <span class="text-xl">🤝</span><span class="text-[9px] font-bold">バディ履歴</span>
            </button>
        </div>
    </nav>

    <main id="app-content" class="p-5 max-w-lg mx-auto hidden">
        
        <div id="tab-home" class="tab-content active space-y-6">
            <section class="guild-card rounded-[2.5rem] p-6 relative">
                <div class="flex items-center gap-5 mb-6">
                    <div class="relative">
                        <img id="user-icon" src="" class="w-20 h-20 rounded-full border-4 border-slate-700 object-cover relative z-10">
                        <div class="absolute -bottom-1 -right-1 bg-amber-500 text-slate-900 px-2 py-0.5 rounded-full text-[10px] font-black z-20 shadow-lg">Lv.<span id="user-level">1</span></div>
                    </div>
                    <div>
                        <p id="user-title" class="text-[10px] font-black text-amber-400 mb-1">称号を鑑定中...</p>
                        <h2 id="user-name" class="text-2xl font-black text-white">冒険者</h2>
                        <p id="user-rank" class="text-[10px] text-slate-400 font-bold bg-slate-800/50 px-2 py-0.5 rounded mt-1 inline-block">RANK: BRONZE</p>
                    </div>
                </div>

                <div class="space-y-2 mb-4">
                    <div class="flex justify-between text-[10px] font-black text-amber-200/50 uppercase tracking-tighter">
                        <span>Experience Points</span><span id="exp-text">0 / 500</span>
                    </div>
                    <div class="h-4 w-full bg-slate-900 rounded-full p-1 border border-slate-700 shadow-inner">
                        <div id="exp-bar" class="h-full bg-gradient-to-r from-amber-600 to-yellow-300 rounded-full transition-all duration-1000 w-0"></div>
                    </div>
                </div>
            </section>

            <div class="bg-slate-800 border-l-4 border-amber-500 p-4 rounded-r-2xl relative">
                <span class="absolute -right-3 -bottom-4 text-6xl opacity-10">🦉</span>
                <p class="text-[10px] text-amber-500 font-black mb-1 flex items-center gap-1"><span>🤖</span> ギルドマスターより</p>
                <p class="text-xs text-slate-300 font-bold leading-relaxed">「冒険者よ、まずは『クエスト』タブから掲示板を見るのじゃ。達成すれば経験値が手に入るぞ！」</p>
            </div>
        </div>

        <div id="tab-quests" class="tab-content space-y-4">
            <h3 class="text-sm font-black text-white tracking-widest flex items-center gap-2"><span class="text-amber-500">📜</span> 依頼と報酬</h3>
            <div id="quest-list-container" class="space-y-3">
                </div>
        </div>

        <div id="tab-ranking" class="tab-content space-y-4">
            <h3 class="text-sm font-black text-white tracking-widest flex items-center gap-2"><span class="text-amber-500">🏆</span> 歴戦の勇者たち</h3>
            <div id="ranking-container" class="space-y-2 bg-slate-800/50 p-4 rounded-3xl border border-slate-700">
                <p class="text-center text-xs text-slate-400">名簿を読み込み中...</p>
            </div>
        </div>

        <div id="tab-buddies" class="tab-content space-y-4">
            <h3 class="text-sm font-black text-white tracking-widest flex items-center gap-2"><span class="text-amber-500">🤝</span> 繋がった仲間たち</h3>
            
            <div id="friends-container" class="space-y-3">
                <p class="text-center text-xs text-slate-400 py-4">名刺ホルダーを読み込み中...</p>
            </div>
            
            <button onclick="location.href='mypage.html'" class="w-full bg-slate-800/80 border border-slate-600 py-3 rounded-2xl flex items-center justify-center gap-2 text-slate-300 font-bold text-xs mt-4 active:scale-95 transition">
                <span>📷</span> マイページでデジタル名刺を交換する
            </button>
        </div>

    </main>

    <script>
        let myUserId = "";
        let myData = null;
        let eventData = null;
        let totalExp = 0;
        let claimedQuests = [];
        const LV_STEP = 500;

        window.onload = async () => {
            try {
                await liff.init({ liffId: "2009176797-MJ4zJxOt" }); // ※LIFF IDは環境に合わせて変更してください
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                myUserId = profile.userId;

                document.getElementById('user-icon').src = profile.pictureUrl;
                document.getElementById('user-name').innerText = profile.displayName;

                const [userRes, eventRes] = await Promise.all([
                    fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getUserData?userId=${myUserId}`),
                    fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getUserEvents?userId=${myUserId}`)
                ]);

                if (userRes.ok && eventRes.ok) {
                    myData = await userRes.json() || {};
                    eventData = await eventRes.json() || { past: [], future: [] };
                    
                    // Firestoreから本物のEXPを読み込む！
                    totalExp = myData.totalExp || 0;
                    claimedQuests = myData.claimedQuests || [];

                    updateStatusUI();
                    renderQuests();
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');

            } catch (err) { console.error(err); }
        };

        // --- フレンドリスト取得 ---
        let friendsLoaded = false;
        async function loadFriends() {
            if(friendsLoaded) return;
            try {
                const res = await fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getMyConnections?userId=${myUserId}`);
                const friends = await res.json();
                
                const container = document.getElementById('friends-container');
                container.innerHTML = "";
                
                if (friends.length === 0) {
                    container.innerHTML = `<p class="text-center text-xs text-slate-400 py-4 bg-slate-800/50 rounded-2xl border border-slate-700">まだ繋がっている仲間がいません。<br>イベントでデジタル名刺を交換しよう！</p>`;
                    return;
                }
                
                friends.forEach(f => {
                    const tagHtml = f.tags.slice(0,2).map(t => `<span class="bg-slate-700 px-1.5 py-0.5 rounded text-[8px] text-slate-300 border border-slate-600">${t}</span>`).join("");
                    
                    container.innerHTML += `
                        <div class="bg-slate-800/80 border border-slate-700 p-4 rounded-2xl flex items-start gap-4 relative overflow-hidden active:scale-95 transition cursor-pointer" onclick="alert('${f.name}さんとのチャットや詳細プロフを見る機能（準備中）')">
                            <div class="w-1 h-full bg-emerald-500 absolute left-0 top-0"></div>
                            <img src="${f.icon}" class="w-12 h-12 rounded-full border border-slate-600 object-cover flex-shrink-0">
                            <div class="flex-1">
                                <p class="text-[10px] text-slate-400 font-bold mb-0.5">${f.chrono.split('（')[0]}</p>
                                <p class="text-sm font-black text-white mb-1">${f.name}</p>
                                <div class="flex flex-wrap gap-1 mb-2">${tagHtml}</div>
                                <div class="bg-slate-900/50 p-2 rounded-lg border border-slate-700/50">
                                    <p class="text-[9px] text-emerald-400 font-bold mb-0.5">🤖 AIのおすすめ話題</p>
                                    <p class="text-[9px] text-slate-300 leading-tight">タップして相性分析と会話のネタをチェック！</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
                friendsLoaded = true;
            } catch(e) { console.error(e); }
        }

        // --- タブ切り替えの関数も少し修正 ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.replace('text-amber-400', 'text-slate-500');
            });
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.replace('text-slate-500', 'text-amber-400');
            
            if (tabId === 'ranking') loadRanking();
            if (tabId === 'buddies') loadFriends(); // ← これを追加！
        }

        function updateStatusUI() {
            const level = Math.floor(totalExp / LV_STEP) + 1;
            const currentExp = totalExp % LV_STEP;
            const percent = (currentExp / LV_STEP) * 100;

            document.getElementById('user-level').innerText = level;
            document.getElementById('exp-text').innerText = `${currentExp} / ${LV_STEP}`;
            document.getElementById('exp-bar').style.width = `${percent}%`;

            let title = "見習い冒険者";
            if(myData.chronoResult?.includes("オオカミ")) title = "夜を統べる魔術師";
            if(myData.coffeeResult?.includes("ブラック")) title = "孤高の戦士";
            document.getElementById('user-title').innerText = `【 ${title} 】`;
        }

        // --- クエストシステム ---
        function renderQuests() {
            const todayStr = new Date().toISOString().split('T')[0];
            const loginQuestId = `login_${todayStr}`;
            
            // クエストの定義
            const allQuests = [
                { id: loginQuestId, title: "📅 毎日の出勤", desc: "ギルドに顔を出す（デイリー）", exp: 50, condition: true },
                { id: "profile", title: "📜 初歩の自己紹介", desc: "マイページでプロフィールを完成", exp: 200, condition: myData.profile && myData.profile.uni },
                { id: "bigfive", title: "🔍 自己の深淵", desc: "心理テスト「Big Five」を完了", exp: 300, condition: !!myData.bigFiveResult },
                { id: "motivation", title: "🔥 炎の源泉", desc: "心理テスト「やる気８タイプ」完了", exp: 300, condition: !!myData.motivationResult },
            ];

            // 過去に参加したイベントを動的にクエストとして追加
            if (eventData.past) {
                eventData.past.forEach((ev, idx) => {
                    allQuests.push({
                        id: `event_${ev.id || idx}`, title: `⚔️ 共闘: ${ev.title.substring(0,10)}`, desc: "イベントに参加して帰還した", exp: 500, condition: true
                    });
                });
            }

            const container = document.getElementById('quest-list-container');
            container.innerHTML = "";

            // 未受取（達成/未達成）を上、受取済みを下にする
            allQuests.sort((a, b) => {
                const aClaimed = claimedQuests.includes(a.id);
                const bClaimed = claimedQuests.includes(b.id);
                return (aClaimed === bClaimed) ? 0 : aClaimed ? 1 : -1;
            });

            allQuests.forEach(q => {
                const isClaimed = claimedQuests.includes(q.id);
                const canClaim = !isClaimed && q.condition;
                
                let btnHTML = "";
                let cardClass = "quest-paper";
                
                if (isClaimed) {
                    cardClass = "quest-completed";
                    btnHTML = `<span class="text-xs font-bold text-slate-500 border border-slate-600 px-3 py-1 rounded-lg">達成済</span>`;
                } else if (canClaim) {
                    cardClass = "quest-paper gold-border";
                    btnHTML = `<button onclick="claim('${q.id}', ${q.exp})" class="claim-ready px-4 py-2 rounded-xl text-xs font-black">受取可能</button>`;
                } else {
                    btnHTML = `<button disabled class="px-4 py-2 bg-slate-300/50 text-slate-500 rounded-xl text-xs font-black opacity-50">未達成</button>`;
                }

                container.innerHTML += `
                    <div id="q-${q.id}" class="${cardClass} p-4 rounded-2xl flex justify-between items-center transition-all duration-300">
                        <div>
                            <h4 class="text-sm font-black mb-1">${q.title}</h4>
                            <p class="text-[10px] font-bold opacity-70">${q.desc}</p>
                            <p class="text-[10px] font-black text-amber-500 mt-1">報酬: +${q.exp} EXP</p>
                        </div>
                        ${btnHTML}
                    </div>
                `;
            });
        }

        async function claim(questId, exp) {
            // 見た目の処理を先に（サクサク感）
            totalExp += exp;
            claimedQuests.push(questId);
            updateStatusUI();
            renderQuests();
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.5 }, colors: ['#fbbf24', '#ffffff'] });

            // バックエンドに本保存
            fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/claimQuestReward`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: myUserId, questId: questId, exp: exp })
            }).catch(e => console.error("保存失敗", e));
        }

        // --- ランキング取得 ---
        let rankingLoaded = false;
        async function loadRanking() {
            if(rankingLoaded) return;
            try {
                const res = await fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getGuildRanking`);
                const ranking = await res.json();
                
                const container = document.getElementById('ranking-container');
                container.innerHTML = "";
                
                ranking.forEach((user, idx) => {
                    const rankStr = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : `${idx+1}位`;
                    const level = Math.floor((user.totalExp || 0) / LV_STEP) + 1;
                    container.innerHTML += `
                        <div class="flex items-center gap-3 p-3 bg-slate-800/80 rounded-2xl border border-slate-700">
                            <div class="text-lg font-black w-8 text-center text-slate-400">${rankStr}</div>
                            <img src="${user.icon}" class="w-10 h-10 rounded-full border border-slate-600 object-cover">
                            <div class="flex-1">
                                <p class="text-[10px] text-slate-400 font-bold mb-0.5">${user.chronoResult.split('（')[0] || "冒険者"}</p>
                                <p class="text-sm font-black text-white">${user.name}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-amber-500 font-black">Lv.${level}</p>
                                <p class="text-[10px] text-slate-500 font-bold">${user.totalExp} EXP</p>
                            </div>
                        </div>
                    `;
                });
                rankingLoaded = true;
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
