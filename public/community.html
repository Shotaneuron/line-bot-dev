<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ゼミ生ギルド - 心理ゼミ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        .exp-bar-fill { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen pb-20 selection:bg-sky-500/30">

    <div id="loading" class="fixed inset-0 bg-slate-900 z-50 flex flex-col justify-center items-center">
        <div class="animate-spin h-10 w-10 border-4 border-sky-500 border-t-transparent rounded-full mb-4"></div>
        <p class="text-sky-400 font-bold text-sm tracking-widest animate-pulse">CONNECTING TO GUILD...</p>
    </div>

    <main id="app-content" class="p-5 hidden space-y-6 max-w-lg mx-auto">
        
        <section class="glass-panel rounded-3xl p-6 relative overflow-hidden shadow-2xl shadow-sky-900/20 mt-4">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-sky-500/20 rounded-full blur-2xl"></div>
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-fuchsia-500/20 rounded-full blur-2xl"></div>
            
            <div class="relative z-10 flex gap-5 items-center mb-6">
                <div class="relative">
                    <img id="user-icon" src="" class="w-20 h-20 rounded-2xl border-2 border-slate-700 object-cover shadow-lg">
                    <div class="absolute -bottom-2 -right-2 bg-slate-800 border border-slate-600 px-2 py-0.5 rounded-md text-[10px] font-black text-sky-400">Lv.<span id="user-level" class="text-sm">1</span></div>
                </div>
                <div>
                    <p id="user-title" class="text-[10px] font-bold text-fuchsia-400 tracking-wider mb-1">称号を分析中...</p>
                    <h1 id="user-name" class="text-2xl font-black neon-text">ゲスト</h1>
                    <p id="user-tags" class="text-xs text-slate-400 mt-1 font-medium"></p>
                </div>
            </div>

            <div class="relative z-10">
                <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1.5">
                    <span>NEXT LEVEL</span>
                    <span id="exp-text">0 / 500 EXP</span>
                </div>
                <div class="h-3 w-full bg-slate-800 rounded-full overflow-hidden border border-slate-700 shadow-inner">
                    <div id="exp-bar" class="h-full bg-gradient-to-r from-sky-500 to-fuchsia-500 exp-bar-fill w-0 relative">
                        <div class="absolute inset-0 bg-white/20 animate-pulse"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-2 gap-4">
            <div class="glass-panel rounded-2xl p-4 flex flex-col items-center justify-center gap-2 active:scale-95 transition cursor-pointer" onclick="alert('準備中！全員のランキングが見れるようになります')">
                <span class="text-3xl">🏆</span>
                <span class="text-xs font-bold text-slate-300">ギルドランキング</span>
            </div>
            <div class="glass-panel rounded-2xl p-4 flex flex-col items-center justify-center gap-2 active:scale-95 transition cursor-pointer" onclick="location.href='calendar.html'">
                <span class="text-3xl">📜</span>
                <span class="text-xs font-bold text-slate-300">クエストボード (予定)</span>
            </div>
        </section>

        <section class="glass-panel rounded-3xl p-6">
            <h2 class="text-sm font-black text-sky-400 flex items-center gap-2 mb-4 tracking-widest"><span class="text-lg">🤝</span> 歴代のバディ（共闘の記憶）</h2>
            
            <div id="buddy-history" class="space-y-3">
                <div class="bg-slate-800/50 border border-slate-700 p-3 rounded-xl flex items-center gap-4 relative overflow-hidden">
                    <div class="w-1 h-full bg-fuchsia-500 absolute left-0 top-0"></div>
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-10 h-10 rounded-full bg-slate-700">
                    <div class="flex-1">
                        <p class="text-[10px] text-slate-400 font-bold mb-0.5">2026/03/10 定例会</p>
                        <p class="text-sm font-black text-slate-200">武田 さん</p>
                    </div>
                    <span class="text-[10px] font-bold bg-fuchsia-500/20 text-fuchsia-400 px-2 py-1 rounded-md border border-fuchsia-500/30">最高の補完関係</span>
                </div>

                <div class="bg-slate-800/50 border border-slate-700 p-3 rounded-xl flex items-center gap-4 relative overflow-hidden">
                    <div class="w-1 h-full bg-sky-500 absolute left-0 top-0"></div>
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="w-10 h-10 rounded-full bg-slate-700">
                    <div class="flex-1">
                        <p class="text-[10px] text-slate-400 font-bold mb-0.5">2026/02/22 心理戦カジノ</p>
                        <p class="text-sm font-black text-slate-200">三上 さん</p>
                    </div>
                    <span class="text-[10px] font-bold bg-sky-500/20 text-sky-400 px-2 py-1 rounded-md border border-sky-500/30">似た者同士</span>
                </div>
            </div>
        </section>

    </main>

    <script>
        let myUserId = "";
        let myData = null;

        document.addEventListener("DOMContentLoaded", () => { initCommunity(); });

        async function initCommunity() {
            try {
                // ※ LIFF IDはテスト用のもの等に書き換えてください
                await liff.init({ liffId: "2009176797-MJ4zJxOt" }); 
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                myUserId = profile.userId;

                document.getElementById('user-icon').src = profile.pictureUrl;
                document.getElementById('user-name').innerText = profile.displayName;

                // ユーザーデータとイベント履歴を同時に取得
                const [userRes, eventRes] = await Promise.all([
                    fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getUserData?userId=${myUserId}`),
                    fetch(`https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getUserEvents?userId=${myUserId}`)
                ]);

                if (userRes.ok && eventRes.ok) {
                    myData = await userRes.json();
                    const eventData = await eventRes.json();
                    renderGuildCard(myData, eventData);
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');

            } catch (err) { console.error(err); }
        }

        function renderGuildCard(userData, eventData) {
            if(!userData || !userData.profile) return;
            
            // 🏷️ タグの表示
            const tags = userData.profile.tags || [];
            document.getElementById('user-tags').innerText = tags.slice(0, 3).join(" / ") + (tags.length > 3 ? "..." : "");

            // 🤖 称号（二つ名）の自動生成ロジック
            let title = "見習いゼミ生";
            const c = userData.chronoResult || "";
            const m = userData.motivationResult || "";
            if(c.includes("オオカミ") && m.includes("成長")) title = "夜を統べるクリエイター";
            else if(c.includes("ライオン") && m.includes("自信")) title = "暁のカリスマリーダー";
            else if(c.includes("クマ") && m.includes("賞賛")) title = "陽だまりのエンターテイナー";
            else if(c.includes("イルカ") && m.includes("成長")) title = "深淵を泳ぐ探求者";
            else if(userData.smResult && userData.smResult.includes("HSM")) title = "空気を操るカメレオン";
            document.getElementById('user-title').innerText = `【 ${title} 】`;

            // ⚔️ 経験値とレベルの計算
            // 過去の参加イベント数 × 100EXP + 診断EXP(一律300)
            const pastEventsCount = eventData.past ? eventData.past.length : 0;
            const totalExp = (pastEventsCount * 100) + 300; 
            
            const level = Math.floor(totalExp / 500) + 1;
            const currentLevelExp = totalExp % 500;
            const percent = Math.min(100, (currentLevelExp / 500) * 100);

            document.getElementById('user-level').innerText = level;
            document.getElementById('exp-text').innerText = `${currentLevelExp} / 500 EXP`;
            
            // 少し遅らせてバーをアニメーションさせる
            setTimeout(() => {
                document.getElementById('exp-bar').style.width = `${percent}%`;
            }, 500);
        }
    </script>
</body>
</html>
