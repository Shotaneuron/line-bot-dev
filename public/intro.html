<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>心理ゼミとは | 北大心理ゼミ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Zen+Kaku+Gothic+New:wght@700;900&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background: linear-gradient(-45deg, #ffffff, #f8fafc, #eff6ff, #fdf4ff, #fffbeb); background-size: 300% 300%; animation: auroraBG 15s ease infinite; color: #1e293b; min-height: 100vh; padding-bottom: 5rem; overflow-x: hidden; }
        @keyframes auroraBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 10px 30px -10px rgba(71, 85, 105, 0.15); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .video-overlay { background: linear-gradient(to top, rgba(255,255,255,1) 0%, rgba(255,255,255,0.2) 60%, rgba(0,0,0,0.1) 100%); }
        .exp-toast { animation: floatUp 1.5s ease-out forwards; pointer-events: none; }
        @keyframes floatUp { 0% { opacity: 0; transform: translate(-50%, 0) scale(0.8); } 20% { opacity: 1; transform: translate(-50%, -20px) scale(1.1); } 80% { opacity: 1; transform: translate(-50%, -40px) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50px) scale(0.9); } }
        .completed-glow { box-shadow: 0 0 15px rgba(52, 211, 153, 0.5); border-color: #34d399 !important; background-color: #ecfdf5 !important; }
        .slide-up { transform: translateY(0) !important; }
        
        /* くるくるローディング用 */
        .loader { border: 2px solid #f3f4f6; border-top: 2px solid #6366f1; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="safe-area-inset-top">

    <!-- ▼▼ ホーム画面（ポータル） ▼▼ -->
    <main id="portal-view" class="relative pb-10">
        <div class="relative w-full h-[40vh] overflow-hidden rounded-b-[2.5rem] shadow-sm mb-6">
            <img src=".images/zemi1.png" class="absolute inset-0 w-full h-full object-cover object-center" alt="">
            <div class="absolute inset-0 video-overlay"></div>
            <div class="absolute bottom-6 left-5 right-5 fade-in">
                <span class="bg-white/90 backdrop-blur text-indigo-600 text-[9px] font-black tracking-widest px-3 py-1 rounded-full shadow-sm">北大心理ゼミ PORTAL</span>
                <h1 class="text-2xl font-black text-slate-800 mt-2 leading-tight tracking-tight" style="font-family: 'Zen Kaku Gothic New', sans-serif;">
                    学問の実践。<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-500">知識を行動に変える場所</span>
                </h1>
            </div>
        </div>

        <div class="px-5 space-y-6">
            <!-- ✨ ユーザープロフィール＆レベルウィジェット ✨ -->
            <section id="user-profile-widget" class="glass-card rounded-2xl p-4 flex items-center gap-4 fade-in cursor-pointer active:scale-95 transition" onclick="openProfile('me')" style="animation-delay: 0.1s;">
                <img id="user-avatar" src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="w-14 h-14 rounded-full border-2 border-white shadow-sm object-cover" alt="User Icon">
                <div class="flex-1">
                    <p class="text-[10px] text-slate-500 font-bold mb-0.5">ようこそ、</p>
                    <p id="user-name" class="text-base font-black text-slate-800 leading-none mb-2">ゲスト さん</p>
                    <div class="flex items-center gap-2">
                        <span id="user-title" class="text-[9px] font-black bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full border border-slate-200 shadow-inner">読込中...</span>
                        <div class="flex-1 h-2 bg-slate-200 rounded-full overflow-hidden">
                            <div id="xp-bar" class="h-full bg-gradient-to-r from-indigo-500 to-pink-500 w-0 transition-all duration-700 ease-out"></div>
                        </div>
                        <span id="progress-text" class="text-[10px] text-slate-500 font-bold">0/0</span>
                    </div>
                </div>
            </section>

            <!-- ✨ 探索モード起動ボタン ✨ -->
            <section class="fade-in" style="animation-delay: 0.2s;">
                <div onclick="startExploration()" class="relative overflow-hidden bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 rounded-2xl p-1 shadow-md cursor-pointer active:scale-95 transition-transform">
                    <div class="bg-white/10 backdrop-blur-md rounded-[1rem] p-4 flex items-center justify-between">
                        <div>
                            <h2 class="text-white font-black text-lg mb-1 tracking-wider">🗺️ ゼミ大辞典を探索する</h2>
                            <p class="text-white/90 text-[10px] font-bold">知識と情報を集めてレベルを上げよう！（全<span id="btn-total-q">0</span>項目）</p>
                        </div>
                        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-white text-xl shadow-inner">👉</div>
                    </div>
                </div>
            </section>
            
            <!-- ✨ ランキングセクション（最初から表示） ✨ -->
            <section class="fade-in" id="ranking-section" style="animation-delay: 0.3s;">
                <div class="flex justify-between items-end mb-3 px-1">
                    <h3 class="text-sm font-black text-slate-800 tracking-widest flex items-center gap-2"><span>🏆</span> 探索ランキング</h3>
                    <button onclick="showAllRanking()" class="text-[10px] text-indigo-500 font-bold bg-indigo-50 border border-indigo-100 px-2.5 py-1 rounded-lg active:scale-95 transition">すべて見る</button>
                </div>
                <!-- 中身をローディング状態にしておく -->
                <div id="ranking-container" class="space-y-2">
                    <div class="flex items-center justify-center gap-2 text-xs text-slate-400 py-6 glass-card rounded-xl">
                        <div class="loader"></div>
                        ランキングデータを取得中...
                    </div>
                </div>
            </section>

            <!-- ✨ 似たレベルのユーザー（最初から表示） ✨ -->
            <section class="fade-in" id="similar-section" style="animation-delay: 0.4s;">
                <h3 class="text-sm font-black text-slate-800 tracking-widest flex items-center gap-2 mb-3 px-1"><span>🤝</span> あなたに近いレベルのゼミ生</h3>

                <div id="similar-users-container" class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                    <div class="flex items-center justify-center gap-2 text-xs text-slate-400 py-6 glass-card rounded-xl w-full">
                        <div class="loader"></div>
                        ライバルを探しています...
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- ▼▼ 探索モード（オーバーレイ） ▼▼ -->
    <div id="explore-modal" class="fixed inset-0 z-[50] hidden flex-col bg-slate-50/95 backdrop-blur-xl animate-[fadeIn_0.2s_ease-out]">
        <div class="flex items-center justify-between p-4 border-b border-slate-200/50 bg-white/70 backdrop-blur-md sticky top-0 z-10">
            <button id="back-btn" onclick="goBack()" class="flex items-center gap-1 text-indigo-600 font-bold text-sm px-2 py-1 active:scale-95 transition opacity-0 pointer-events-none">
                <span class="text-lg leading-none">◁</span> 戻る
            </button>
            <div class="text-[10px] font-black text-slate-400 tracking-widest absolute left-1/2 transform -translate-x-1/2">Q&A EXPLORER</div>
            <button onclick="closeExploration()" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-black active:scale-95 transition text-xs">✕</button>
        </div>

        <div class="flex-1 overflow-y-auto pb-10 px-5 pt-5 relative" id="explore-scroll-area">
            <div id="breadcrumb" class="flex flex-wrap items-center gap-1.5 mb-5 text-[9px] font-bold text-slate-400"></div>
            <div class="mb-6 fade-in" id="question-header">
                <span id="current-icon" class="text-4xl block mb-2 drop-shadow-sm">🤔</span>
                <h2 id="current-question" class="text-xl font-black text-slate-800 leading-tight tracking-tight">何について知りたいですか？</h2>
            </div>
            <div id="options-container" class="space-y-3"></div>
            <div id="page-content" class="hidden glass-card rounded-3xl p-5 fade-in">
                <h3 id="page-title" class="text-lg font-black text-slate-800 mb-3 border-b border-slate-200 pb-2"></h3>
                <div id="page-desc" class="text-sm text-slate-600 leading-relaxed font-medium mb-6 whitespace-pre-wrap"></div>
                <button id="btn-mark-read" onclick="markAsRead()" class="w-full bg-indigo-50 border border-indigo-200 text-indigo-600 font-black py-4 rounded-xl shadow-sm active:scale-95 transition flex items-center justify-center gap-2">
                    <span class="text-lg">☑️</span> 読んだ！（EXPを獲得）
                </button>
            </div>
        </div>
    </div>

    <!-- ▼▼ ランキング全表示モーダル ▼▼ -->
    <div id="ranking-modal" class="fixed inset-0 z-[55] hidden flex-col bg-slate-50/95 backdrop-blur-xl animate-[fadeIn_0.2s_ease-out]">
        <div class="flex items-center justify-between p-4 border-b border-slate-200/50 bg-white/70 backdrop-blur-md sticky top-0 z-10">
            <div class="w-8"></div>
            <div class="text-sm font-black text-slate-800 tracking-widest">🏆 探索ランキング</div>
            <button onclick="closeRankingModal()" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-black active:scale-95 transition text-xs">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto p-5 pb-10" id="full-ranking-container"></div>
    </div>

    <!-- ▼▼ ユーザープロフィール（ Bottom Sheet ） ▼▼ -->
    <div id="profile-modal" class="fixed inset-0 z-[70] hidden flex-col justify-end bg-slate-900/40 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]" onclick="closeProfile()">
        <div class="bg-white rounded-t-[2rem] p-6 pb-12 w-full shadow-2xl relative translate-y-full transition-transform duration-300 ease-out" id="profile-sheet" onclick="event.stopPropagation()">
            <div class="absolute top-3 left-1/2 transform -translate-x-1/2 w-12 h-1.5 bg-slate-200 rounded-full"></div>
            <div id="profile-content" class="mt-4 text-center"></div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-1/2 left-1/2 z-[100]"></div>

    <script>
        // ==========================================
        // 📚 探索用データ（約100項目）
        // ==========================================

                                { id: "lec_sayno", label: "断れない性格の治し方", icon: "🙅‍♂️", type: "page", title: "断れない性格の治し方", description: "人間関係を壊さずに上手く「NO」を言うためのアサーティブな断り方3STEPを伝授。" },

                                { id: "faq_adult", label: "Q. 社会人でも参加できますか？", icon: "💼", type: "page", title: "Q. 社会人の参加について", description: "A. 残念ながら社会人の方の入部はお断りしています。（心理ゼミ卒業生の社会人に限って参加可能）学生が価値を受け取り、生み出す、そして新たな視点を共有し合えるコミュニティを作るのがこの心理ゼミとなっています。" }

                        },
                        {
                            id: "join_process", label: "🐾 加入ステップ", icon: "🎉", question: "どうやってゼミに入るの？",
                            children: [
                                { id: "join_flow", label: "ゼミに入るまでの流れ", icon: "1️⃣", type: "page", title: "ゼミに入るには？", description: "1. 「LINEグループ」に参加\n2. 公式LINEから「入部」申請\n3. 代表からの承認通知を経て「入部」完了！🎉 ※別途部費のお支払いが必要になります\nNotionの閲覧権限や、公式LINEの全機能が解放され、心理ゼミのすべての情報、活動、人間関係へのアクセス県が与えられます。" },
                                { id: "join_interview", label: "入部届けって何するの？", icon: "🗣️", type: "page", title: "入部届けとは", description: "公式LINEを読み込み、案内に表示される「入部届け」ボタンを押し、名前や所属などの簡単な情報を数件入力するだけ！申請後は、運営部からの承認を受けると公式LINEの機能が全て解放されます" },
                                { id: "join_contact", label: "お問い合わせ先", icon: "✉️", type: "page", title: "お問い合わせ", description: "少しでも気になった方は、この公式LINEのトーク画面から直接メッセージを送るか、代表の加藤翔大、秘書の青木蓮、三上晃生にLINEでお気軽にご連絡ください！" }
                            ]

                    ]
                }
            ]
        };

        // ==========================================
        // 🎮 システムロジック＆Firebase API連携
        // ==========================================
        let allPageIds = [];
        function extractAllPages(node) {
            if (node.type === "page") allPageIds.push(node.id);
            else if (node.children) node.children.forEach(child => extractAllPages(child));
        }
        extractAllPages(exploreData);
        const MAX_EXP = allPageIds.length;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-total-q').innerText = MAX_EXP;
        });

        let myProfile = { 
            id: 'me', name: 'ゲスト', exp: 0, 
            icon: 'https://cdn-icons-png.flaticon.com/512/847/847969.png', 
            univ: '未設定', grade: '', message: 'ゼミ大辞典を探索中...' 
        };

        let communityUsers = [];

        async function loadCommunityData() {
            try {
                // 先ほど作成した専用のAPI（getIntroRanking）を呼び出す
                const res = await fetch('https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/getIntroRanking');
                if (!res.ok) throw new Error("APIレスポンスエラー");
                
                const allUsersData = await res.json();

                const myDbData = allUsersData.find(u => u.id === myProfile.id);
                if (myDbData) {
                    // LINEアイコンが消えていたらDBのアイコンを使う
                    const safeIcon = myProfile.icon || myDbData.icon;
                    myProfile = { ...myProfile, ...myDbData, icon: safeIcon };
                }

                // API側で綺麗に整形されたデータが返ってくるので、自分以外のユーザーをセットするだけ！
                communityUsers = allUsersData.filter(u => u.id !== myProfile.id);
                
                renderCommunity();
            } catch (e) {
                console.error("コミュニティデータの取得に失敗しました:", e);
                document.getElementById('ranking-container').innerHTML = '<div class="text-center text-xs text-red-400 py-4">ランキングの取得に失敗しました。</div>';
                document.getElementById('similar-users-container').innerHTML = '<div class="text-center text-xs text-red-400 py-4 w-full">ユーザーの取得に失敗しました。</div>';
            }
        }

        async function saveExpToFirebase(newExp) {
            if (!myProfile.id || myProfile.id === 'me') return;
            try {
                await fetch('https://asia-northeast1-shinrizemi-linebot.cloudfunctions.net/updateIntroExp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lineId: myProfile.id, exp: newExp })
                });
            } catch(e) {
                console.error("EXPの保存に失敗", e);
            }
        }

        function getLevelInfo(exp) {
            if (exp >= MAX_EXP) return { text: "辞典コンプリート (Lv.MAX)", class: "bg-yellow-100 text-yellow-700 border-yellow-300" };
            if (exp >= 70) return { text: "心理ゼミの主 (Lv.6)", class: "bg-red-100 text-red-600 border-red-200" };
            if (exp >= 45) return { text: "ゼミの伝道師 (Lv.5)", class: "bg-orange-100 text-orange-600 border-orange-200" };
            if (exp >= 25) return { text: "ゼミマスター (Lv.4)", class: "bg-pink-100 text-pink-600 border-pink-200" };
            if (exp >= 10) return { text: "一人前ゼミ生 (Lv.3)", class: "bg-purple-100 text-purple-600 border-purple-200" };
            if (exp >= 3) return { text: "見習いゼミ生 (Lv.2)", class: "bg-indigo-100 text-indigo-600 border-indigo-200" };
            return { text: "ゼミ見学者 (Lv.1)", class: "bg-slate-100 text-slate-600 border-slate-200" };
        }

        function getFolderProgress(node) {
            if (node.type === "page") return localStorage.getItem('zemi_read_' + node.id) === 'true' ? { read: 1, total: 1 } : { read: 0, total: 1 };
            let res = { read: 0, total: 0 };
            if (node.children) node.children.forEach(child => {
                let childProg = getFolderProgress(child);
                res.read += childProg.read; res.total += childProg.total;
            });
            return res;
        }

        function updatePlayerStatus() {
            const readPages = allPageIds.filter(id => localStorage.getItem('zemi_read_' + id) === 'true');
            const currentExp = readPages.length;
            myProfile.exp = currentExp; 
            
            document.getElementById('progress-text').innerText = `${currentExp}/${MAX_EXP} 完了`;
            const percent = (currentExp / MAX_EXP) * 100;
            document.getElementById('xp-bar').style.width = `${percent}%`;

            const lvl = getLevelInfo(currentExp);
            const titleEl = document.getElementById('user-title');
            titleEl.innerText = lvl.text;
            titleEl.className = `text-[9px] font-black px-2 py-0.5 rounded-full border shadow-inner ${lvl.class}`;

            renderCommunity(); 
        }

        // ==========================================
        // 🏆 コミュニティ（ランキング・似た人）描画
        // ==========================================
        function renderCommunity() {
            // 自分を含めた全員のランキングを作成（自分一人の場合でも成立する）
            const allUsers = [...communityUsers, myProfile].sort((a, b) => b.exp - a.exp);
            const top5 = allUsers.slice(0, 5);

            let rankingHtml = "";
            top5.forEach((u, index) => {
                const lvl = getLevelInfo(u.exp);
                let crown = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : `<span class="text-xs text-slate-400 font-black">${index+1}</span>`;
                let isMe = u.id === 'me' || u.id === myProfile.id ? 'border-indigo-300 bg-indigo-50/40' : 'border-slate-100 bg-white';

                rankingHtml += `
                    <div class="flex items-center gap-3 p-3 ${isMe} rounded-xl shadow-sm border cursor-pointer active:scale-95 transition" onclick="openProfile('${u.id}')">
                        <div class="w-6 text-center text-lg">${crown}</div>
                        <div class="relative flex-shrink-0">
                            <img src="${u.icon || u.pictureUrl}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'" class="w-12 h-12 rounded-full border-2 border-slate-100 object-cover">
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <p class="text-sm font-black text-slate-800 truncate">${u.name} ${(u.id==='me' || u.id===myProfile.id) ? '<span class="text-[9px] text-indigo-500 bg-indigo-100 px-1.5 py-0.5 rounded ml-1">あなた</span>' : ''}</p>
                            <span class="text-[9px] px-1.5 py-0.5 rounded-full border ${lvl.class}">${lvl.text}</span>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <p class="text-sm font-black text-indigo-600">${u.exp} <span class="text-[9px] text-indigo-400">EXP</span></p>
                        </div>
                    </div>
                `;
            });
            document.getElementById('ranking-container').innerHTML = rankingHtml;

            // 似たレベルのユーザーの描画（自分以外のユーザーから）
            let similarHtml = "";
            if (communityUsers.length === 0) {
                // 自分以外に誰もいない場合の表示
                similarHtml = `
                    <div class="glass-card p-4 rounded-2xl w-full flex flex-col items-center justify-center text-center border border-slate-200 border-dashed">
                        <span class="text-3xl mb-2">👀</span>
                        <p class="text-xs font-black text-slate-600">まだ他のゼミ生がいません</p>
                        <p class="text-[10px] text-slate-400 mt-1">あなたが最初の探索者です！</p>
                    </div>
                `;
            } else {
                const similarUsers = communityUsers
                    .map(u => ({ ...u, diff: Math.abs(u.exp - myProfile.exp) }))
                    .sort((a, b) => a.diff - b.diff)
                    .slice(0, 8);

                similarUsers.forEach(u => {
                    const lvl = getLevelInfo(u.exp);
                    similarHtml += `
                        <div class="glass-card p-3 rounded-2xl w-28 flex-shrink-0 flex flex-col items-center text-center cursor-pointer active:scale-95 transition border border-slate-100" onclick="openProfile('${u.id}')">
                            <img src="${u.icon}" class="w-12 h-12 rounded-full object-cover shadow-sm border-2 border-white mb-2" onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
                            <p class="text-xs font-black text-slate-800 truncate w-full">${u.name}</p>
                            <p class="text-[9px] text-slate-500 font-bold mb-1.5">${u.exp} EXP</p>
                            <span class="text-[8px] px-1.5 py-0.5 rounded-full border ${lvl.class} w-full truncate">${lvl.text}</span>
                        </div>
                    `;
                });
            }
            document.getElementById('similar-users-container').innerHTML = similarHtml;
        }

        // ==========================================
        // 🗺️ 探索UI制御
        // ==========================================
        let historyStack = [];
        let currentNode = exploreData;

        function startExploration() {
            document.getElementById('explore-modal').classList.remove('hidden');
            document.getElementById('explore-modal').classList.add('flex');
            historyStack = [exploreData];
            renderNode(exploreData);
        }

        function closeExploration() {
            document.getElementById('explore-modal').classList.add('hidden');
            document.getElementById('explore-modal').classList.remove('flex');
            updatePlayerStatus();
        }

        function renderNode(node) {
            currentNode = node;
            
            const backBtn = document.getElementById('back-btn');
            if (historyStack.length > 1) {
                backBtn.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                backBtn.classList.add('opacity-0', 'pointer-events-none');
            }

            let breadcrumbHtml = `<span onclick="goBackTo(0)" class="cursor-pointer text-indigo-500 hover:underline">🏠 トップ</span>`;
            for (let i = 1; i < historyStack.length; i++) {
                let shortLabel = historyStack[i].label.split(' ')[1] || historyStack[i].label;
                breadcrumbHtml += `<span class="text-slate-300 mx-1">/</span><span onclick="goBackTo(${i})" class="cursor-pointer text-indigo-500 truncate max-w-[80px] hover:underline">${shortLabel}</span>`;
            }
            document.getElementById('breadcrumb').innerHTML = breadcrumbHtml;

            document.getElementById('current-icon').innerText = node.icon || "✨";
            document.getElementById('current-question').innerText = node.question || "詳細を見る";

            document.getElementById('explore-scroll-area').scrollTop = 0;

            if (node.type === "page") {
                document.getElementById('options-container').classList.add('hidden');
                document.getElementById('page-content').classList.remove('hidden');
                
                document.getElementById('page-title').innerText = node.title || node.label;
                document.getElementById('page-desc').innerText = node.description;
                
                const isRead = localStorage.getItem('zemi_read_' + node.id) === 'true';
                const btn = document.getElementById('btn-mark-read');
                if (isRead) {
                    btn.innerHTML = `<span class="text-lg">✅</span> 既読済み（戻る）`;
                    btn.className = "w-full bg-emerald-50 border border-emerald-200 text-emerald-600 font-black py-4 rounded-xl shadow-sm active:scale-95 transition flex items-center justify-center gap-2 mt-4";
                } else {
                    btn.innerHTML = `<span class="text-lg">☑️</span> 読んだ！（EXPを獲得）`;
                    btn.className = "w-full bg-gradient-to-r from-indigo-500 to-pink-500 text-white font-black py-4 rounded-xl shadow-md active:scale-95 transition flex items-center justify-center gap-2 mt-4";
                }
            } else {
                document.getElementById('page-content').classList.add('hidden');
                document.getElementById('options-container').classList.remove('hidden');
                
                let optionsHtml = "";
                if (node.children) {
                    node.children.forEach(child => {
                        let statusIcon = "👉";
                        let borderClass = "border-slate-200";
                        let bgClass = "bg-white";
                        let textClass = "text-slate-700";
                        let extraClass = "";
                        
                        const prog = getFolderProgress(child);
                        const isCompleted = prog.total > 0 && prog.read === prog.total;
                        
                        let progressTextHtml = "";
                        if (child.type !== "page") {
                            progressTextHtml = `<span class="text-[9px] font-bold text-slate-400 ml-2">(${prog.read}/${prog.total})</span>`;
                        }

                        if (isCompleted) {
                            statusIcon = "✅";
                            extraClass = "completed-glow";
                            textClass = "text-emerald-700";
                        } else if (child.type === "page" && prog.read > 0) {
                            statusIcon = "✅";
                            bgClass = "bg-slate-50";
                            textClass = "text-slate-500";
                        }

                        optionsHtml += `
                            <button onclick="selectOption('${child.id}')" class="w-full ${bgClass} ${borderClass} ${extraClass} border rounded-2xl p-4 flex items-center justify-between shadow-sm hover:shadow-md active:scale-95 transition-all text-left">
                                <div class="flex items-center gap-3 flex-1 overflow-hidden">
                                    <span class="text-2xl flex-shrink-0">${child.icon || "✨"}</span>
                                    <div class="truncate">
                                        <span class="font-black ${textClass} text-sm">${child.label}</span>
                                        ${progressTextHtml}
                                    </div>
                                </div>
                                <span class="text-sm ml-2 flex-shrink-0">${statusIcon}</span>
                            </button>
                        `;
                    });
                }
                document.getElementById('options-container').innerHTML = optionsHtml;
            }
        }

        function selectOption(childId) {
            const childNode = currentNode.children.find(c => c.id === childId);
            if (childNode) {
                historyStack.push(childNode);
                renderNode(childNode);
            }
        }

        function goBack() {
            if (historyStack.length > 1) {
                historyStack.pop();
                renderNode(historyStack[historyStack.length - 1]);
            }
        }

        function goBackTo(index) {
            historyStack = historyStack.slice(0, index + 1);
            renderNode(historyStack[historyStack.length - 1]);
        }

        function showExpToast() {
            const toast = document.createElement('div');
            toast.className = 'exp-toast text-pink-500 font-black text-2xl drop-shadow-md';
            toast.innerText = '✨ +1 EXP';
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function markAsRead() {
            const wasRead = localStorage.getItem('zemi_read_' + currentNode.id) === 'true';
            
            if (!wasRead) {
                localStorage.setItem('zemi_read_' + currentNode.id, 'true');
                showExpToast();
                
                updatePlayerStatus();
                saveExpToFirebase(myProfile.exp);
                
                setTimeout(() => { goBack(); }, 600);
            } else {
                goBack();
            }
        }

        // ==========================================
        // 📊 モーダル制御（全ランキング・プロフィール）
        // ==========================================
        function showAllRanking() {
            document.getElementById('ranking-modal').classList.remove('hidden');
            document.getElementById('ranking-modal').classList.add('flex');
            
            const allUsers = [...communityUsers, myProfile].sort((a, b) => b.exp - a.exp);
            let html = "";
            allUsers.forEach((u, index) => {
                const lvl = getLevelInfo(u.exp);
                let crown = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : `<span class="text-sm text-slate-400 font-black">${index+1}</span>`;
                let isMe = u.id === 'me' || u.id === myProfile.id ? 'border-indigo-300 bg-indigo-50/50' : 'border-slate-100 bg-white';

                html += `
                    <div class="flex items-center gap-4 p-3 ${isMe} rounded-xl shadow-sm border mb-2 cursor-pointer active:scale-95 transition" onclick="openProfile('${u.id}')">
                        <div class="w-8 text-center text-xl">${crown}</div>
                        <img src="${u.icon}" class="w-12 h-12 rounded-full object-cover shadow-sm border border-slate-200" onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
                        <div class="flex-1 overflow-hidden">
                            <p class="text-base font-black text-slate-800 truncate">${u.name} ${(u.id==='me' || u.id===myProfile.id) ? '<span class="text-[9px] text-indigo-500 bg-indigo-100 px-1.5 py-0.5 rounded ml-1">あなた</span>' : ''}</p>
                            <span class="text-[9px] px-1.5 py-0.5 rounded-full border ${lvl.class}">${lvl.text}</span>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <p class="text-lg font-black text-indigo-600">${u.exp}</p>
                            <p class="text-[9px] text-indigo-400 font-bold -mt-1">EXP</p>
                        </div>
                    </div>
                `;
            });
            document.getElementById('full-ranking-container').innerHTML = html;
        }

        function closeRankingModal() {
            document.getElementById('ranking-modal').classList.add('hidden');
            document.getElementById('ranking-modal').classList.remove('flex');
        }

function openProfile(userId) {
            // 1. ユーザーの特定処理（元のコードのまま）
            const user = (userId === 'me' || userId === myProfile.id) ? myProfile : communityUsers.find(u => u.id === userId);
            if(!user) return;
            
            // 2. レベル情報の取得（元のコードのまま）
            const lvl = getLevelInfo(user.exp);

            // 3. データが未設定の場合の「初期値（フォールバック）」を用意しておく
            const univ = user.univ || user.university || "未設定";
            const faculty = user.faculty || "未設定";
            const grade = user.grade || "未設定";
            const message = user.message || user.oneWord || "よろしくお願いします！";
            const bio = user.bio || "まだ自己紹介が入力されていません。";
            // アイコン画像がない、またはエラー時の代替画像パスを設定
            const iconSrc = user.icon || user.pictureUrl || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            // 4. 追加したい5項目を組み込んだ新しいHTMLテンプレート
            const html = `
                <div class="flex flex-col items-center">
                    <img src="${iconSrc}" class="w-24 h-24 rounded-full object-cover shadow-md border-4 border-white mb-3" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                    <h3 class="text-xl font-black text-slate-800 mb-1">${user.name}</h3>
                    <span class="text-[10px] px-2 py-0.5 rounded-full border ${lvl.class} mb-4">${lvl.text}</span>
                    
                    <div class="bg-slate-50 w-full rounded-2xl p-4 border border-slate-100 space-y-3 text-left">
                        
                        <div class="flex justify-between items-center border-b border-slate-200 pb-2">
                            <span class="text-xs font-bold text-slate-400">探索経験値</span>
                            <span class="text-sm font-black text-indigo-600">${user.exp} <span class="text-[10px]">EXP</span></span>
                        </div>

                        <div class="grid grid-cols-2 gap-2 text-xs border-b border-slate-200 pb-3">
                            <div class="bg-white p-2 rounded-xl border border-slate-100 flex items-center gap-2 shadow-sm">
                                <span>🏫</span><span class="font-bold text-slate-700 truncate">${univ}</span>
                            </div>
                            <div class="bg-white p-2 rounded-xl border border-slate-100 flex items-center gap-2 shadow-sm">
                                <span>🎓</span><span class="font-bold text-slate-700 truncate">${faculty}</span>
                            </div>
                            <div class="bg-white p-2 rounded-xl border border-slate-100 flex items-center gap-2 col-span-2 justify-center shadow-sm">
                                <span>🏷️</span><span class="font-bold text-slate-700">${grade}</span>
                            </div>
                        </div>

                        <div class="border-b border-slate-200 pb-3">
                            <span class="text-xs font-bold text-slate-400 block mb-1">ひとこと</span>
                            <p class="text-sm font-medium text-slate-700 bg-white p-3 rounded-xl border border-slate-100 leading-relaxed whitespace-pre-wrap shadow-sm">${message}</p>
                        </div>

                        <div>
                            <span class="text-xs font-bold text-slate-400 block mb-1">自己紹介</span>
                            <p class="text-xs font-medium text-slate-600 bg-white p-3 rounded-xl border border-slate-100 leading-relaxed whitespace-pre-wrap min-h-[4rem] shadow-sm">${bio}</p>
                        </div>

                    </div>
                    
                    <button onclick="closeProfile()" class="mt-6 w-full bg-slate-800 text-white font-black py-3 rounded-xl active:scale-95 transition">閉じる</button>
                </div>
            `;
            
            // 5. 生成したHTMLをモーダル内にセット
            document.getElementById('profile-content').innerHTML = html;
            
            // 6. モーダルを表示するアニメーション処理
            const modal = document.getElementById('profile-modal');
            const sheet = document.getElementById('profile-sheet');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => { sheet.classList.add('slide-up'); }, 10);
        }

        function closeProfile() {
            const modal = document.getElementById('profile-modal');
            const sheet = document.getElementById('profile-sheet');
            sheet.classList.remove('slide-up');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        // ==========================================
        // 🚀 LIFF初期化＆データ取得開始
        // ==========================================
        async function initIntro() {
            updatePlayerStatus();
            document.getElementById('user-profile-widget').classList.remove('hidden');

            try {
                await liff.init({ liffId: "2009176797-wHDy2QrV" }); 
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    myProfile.id = profile.userId;
                    myProfile.name = profile.displayName;
                    myProfile.icon = profile.pictureUrl || myProfile.icon;
                    document.getElementById('user-name').innerText = myProfile.name + " さん";
                    document.getElementById('user-avatar').src = myProfile.icon;
                    
                    await loadCommunityData();
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init Error:", err);
                // エラー時でもローディング表示を解除して単独モードで動かす
                renderCommunity();
            }
        }
        
        initIntro();
    </script>
</body>
</html>
