name: Firebase Auto Deploy

# mainブランチにpushされた時だけ自動で動く
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. コードをGitHubから持ってくる
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Node.js（JavaScript環境）を準備する
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18" # ※functions/package.jsonのエンジンに合わせる（18か20）

      # 3. Functionsのライブラリをインストールしてビルドする
      - name: Install and Build Functions
        working-directory: ./functions
        run: |
          npm install
          npm run build

      # 4. Firebaseにデプロイする（FunctionsとHosting両方）
      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only functions,hosting --token "${{ secrets.FIREBASE_TOKEN }}"
